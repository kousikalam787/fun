<!DOCTYPE html>
<html>
<head>
<title>2 Player Tug Battle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  text-align:center;
}

h2{
  margin-top:20px;
}

#status{
  margin-top:10px;
  color:#22c55e;
}

#barContainer{
  width:90%;
  height:45px;
  background:#222;
  margin:60px auto;
  border-radius:30px;
  overflow:hidden;
  position:relative;
}

#bar{
  width:50%;
  height:100%;
  background:linear-gradient(90deg,red,orange,yellow);
  position:absolute;
  left:25%;
  transition:0.1s;
}

button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🔥 Tug Battle Multiplayer</h2>
<div id="status">Connecting...</div>

<div id="barContainer">
  <div id="bar"></div>
</div>

<button onclick="hit()">PUSH 🔥</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  get,
  update,
  onValue,
  push,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWroui9jH0HhKmg-O6g9HWs",
  authDomain: "kousik-game.firebaseapp.com",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kousik-game",
  storageBucket: "kousik-game.firebasestorage.app",
  messagingSenderId: "403996094819",
  appId: "1:403996094819:web:0f6e9cf855a9c4b09d2356"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const statusEl = document.getElementById("status");

let playerId = Math.random().toString(36).substr(2, 9);
let myRoom = null;
let mySide = null;

// matchmaking queue
const queueRef = ref(db, "queue");
const roomsRef = ref(db, "rooms");

// ---------------- MATCHMAKING ----------------
async function findMatch(){

  statusEl.innerText = "Finding opponent...";

  const qSnap = await get(queueRef);

  if(!qSnap.exists()){
    // no player waiting → join queue
    const newQ = push(queueRef);
    set(newQ, { id: playerId });

    // wait for match
    onValue(queueRef, (snap)=>{
      checkMatch();
    });

  } else {
    // opponent exists → create room
    let opponentId = null;

    qSnap.forEach(child=>{
      opponentId = child.val().id;
    });

    if(opponentId && opponentId !== playerId){
      startRoom(opponentId);
    }
  }
}

// create room
function startRoom(opponentId){

  const roomId = "room_" + Date.now();

  myRoom = roomId;

  set(ref(db,"rooms/"+roomId),{
    p1:{id: playerId, power:0},
    p2:{id: opponentId, power:0}
  });

  remove(queueRef);

  mySide = "p1";
  statusEl.innerText = "Matched! You are P1 🔵";

  listenRoom(roomId);
}

// check if matched
function checkMatch(){
  get(queueRef).then(snap=>{
    if(!snap.exists()) return;

    let ids = [];
    snap.forEach(c=>{
      ids.push(c.val().id);
    });

    if(ids.length >= 2){
      startRoom(ids[0]);
    }
  });
}

// ---------------- GAME LOGIC ----------------
function listenRoom(roomId){

  onValue(ref(db,"rooms/"+roomId),(snap)=>{
    const data = snap.val();
    if(!data) return;

    let p1 = data.p1?.power || 0;
    let p2 = data.p2?.power || 0;

    let diff = p1 - p2;

    let bar = document.getElementById("bar");
    let pos = 25 + diff;

    if(pos < 0) pos = 0;
    if(pos > 50) pos = 50;

    bar.style.left = pos + "%";

    if(diff >= 40){
      alert("🔥 P1 Wins!");
      reset(roomId);
    }

    if(diff <= -40){
      alert("🔥 P2 Wins!");
      reset(roomId);
    }
  });
}

// reset match
function reset(roomId){
  update(ref(db,"rooms/"+roomId),{
    p1:{power:0},
    p2:{power:0}
  });
}

// ---------------- HIT BUTTON ----------------
window.hit = async function(){

  if(!myRoom) {
    await findMatch();
    return;
  }

  const roomSnap = await get(ref(db,"rooms/"+myRoom));
  const data = roomSnap.val();

  if(!data) return;

  if(data.p1.id === playerId){
    data.p1.power += 2;
  } else {
    data.p2.power += 2;
  }

  update(ref(db,"rooms/"+myRoom),{
    p1: data.p1,
    p2: data.p2
  });
};

// start game
findMatch();

</script>

</body>
</html>
