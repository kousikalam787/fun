<!DOCTYPE html>
<html>
<head>
  <title>2 Player Battle Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #barContainer {
      width: 90%;
      height: 40px;
      background: #333;
      margin: 60px auto;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }

    #bar {
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, red, orange);
      position: absolute;
      left: 25%;
      transition: 0.1s;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #00ff88;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🔥 2 Player Battle Game</h2>

<div id="barContainer">
  <div id="bar"></div>
</div>

<button onclick="hit()">TAP PUSH</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWroui9jH0HhKmg-O6g9HWs",
  authDomain: "kousik-game.firebaseapp.com",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kousik-game",
  storageBucket: "kousik-game.firebasestorage.app",
  messagingSenderId: "403996094819",
  appId: "1:403996094819:web:0f6e9cf855a9c4b09d2356"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const roomId = "room1";
const roomRef = ref(db, "rooms/" + roomId);

// ✅ ONLY initialize if room doesn't exist
get(roomRef).then((snap) => {
  if (!snap.exists()) {
    update(roomRef, {
      p1: 0,
      p2: 0
    });
  }
});

// realtime UI
onValue(roomRef, (snap) => {
  const data = snap.val();
  if (!data) return;

  let p1 = data.p1 || 0;
  let p2 = data.p2 || 0;

  // convert to bar position (-40 to +40)
  let power = p1 - p2;

  let bar = document.getElementById("bar");
  let left = 25 + power;

  bar.style.left = left + "%";

  if (power >= 40) {
    alert("🔥 Player 1 Wins!");
    update(roomRef, { p1: 0, p2: 0 });
  }

  if (power <= -40) {
    alert("🔥 Player 2 Wins!");
    update(roomRef, { p1: 0, p2: 0 });
  }
});

// assign player randomly (simple demo)
let me = Math.random() > 0.5 ? "p1" : "p2";

window.hit = function () {
  get(roomRef).then((snap) => {
    let data = snap.val();
    if (!data) return;

    let current = data[me] || 0;
    current += 2;

    let updateData = {};
    updateData[me] = current;

    update(roomRef, updateData);
  });
};
</script>

</body>
</html>
