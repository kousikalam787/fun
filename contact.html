<!DOCTYPE html>
<html>
<head>
  <title>Contact - Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* 🎥 FULL SCREEN VIDEO FIX */
    #bgVideo{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* NAV FIX */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 18px;
      background:rgba(0,0,0,0.6);
      flex-wrap:wrap;
    }

    .nav-links{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      font-weight:bold;
      font-size:14px;
      padding:6px 10px;
      border-radius:6px;
      transition:0.2s;
    }

    .nav-links a:hover{
      background:#22c55e;
    }

    /* CENTER CONTENT */
    .container{
      padding:40px 15px;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .card{
      background:rgba(30,41,59,0.85);
      padding:25px;
      border-radius:15px;
      width:90%;
      max-width:420px;
      text-align:center;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    .card h2{
      margin-bottom:10px;
    }

    .card p{
      font-size:14px;
      opacity:0.9;
      margin-bottom:15px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:6px 0;
      border:none;
      border-radius:6px;
      outline:none;
    }

    button{
      padding:10px 15px;
      border:none;
      background:#22c55e;
      color:white;
      border-radius:6px;
      cursor:pointer;
      width:100%;
      margin-top:10px;
    }

    button:active{
      transform:scale(0.97);
    }

    /* 📱 INSTAGRAM BUTTON */
    .insta{
      display:inline-block;
      margin-top:15px;
      padding:10px 14px;
      background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
    }

  </style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<nav>
  <h3>🎮 Fun Zone</h3>

  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Policy</a>
  </div>
</nav>

<!-- CONTENT -->
<div class="container">

  <div class="card">

    <h2>📞 Contact Us</h2>
    <p>Have any issue or feedback? Send us a message</p>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="4" placeholder="Your Message"></textarea>

    <button>Send Message</button>

    <!-- INSTAGRAM LINK -->
    <a class="insta"
       href="https://www.instagram.com/______black_____444__?igsh=am9uZHFpam5rY3Jp"
       target="_blank">
      📷 Follow on Instagram
    </a>

  </div>

</div>

</body>
</html>
