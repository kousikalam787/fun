<!DOCTYPE html>
<html>
<head>
  <title>Contact - Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      min-height:100vh;
      color:white;
      overflow:hidden;
    }

    /* 🎥 FULL VIDEO BACKGROUND FIX */
    #bgVideo{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* CENTER LAYOUT */
    .container{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      text-align:center;
      background:rgba(30,41,59,0.85);
      padding:30px 25px;
      border-radius:15px;
      width:90%;
      max-width:350px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .card h2{
      margin-bottom:10px;
      font-size:22px;
    }

    .card p{
      font-size:14px;
      opacity:0.8;
      margin-bottom:20px;
    }

    /* 📷 INSTAGRAM BUTTON */
    .insta-btn{
      display:inline-block;
      padding:12px 18px;
      background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      transition:0.2s;
    }

    .insta-btn:active{
      transform:scale(0.96);
    }

  </style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- CENTER CARD -->
<div class="container">

  <div class="card">

    <h2>📞 Contact Us</h2>
    <p>Follow us for updates, games & new features</p>

    <a class="insta-btn"
       href="https://www.instagram.com/______black_____444__?igsh=am9uZHFpam5rY3Jp"
       target="_blank">
      📷 Follow on Instagram
    </a>

  </div>

</div>

</body>
</html>
