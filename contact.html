<!DOCTYPE html>
<html>
<head>
  <title>Contact - Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* 🎥 VIDEO BACKGROUND */
    #bgVideo{
      position:fixed;
      right:0;
      bottom:0;
      min-width:100%;
      min-height:100%;
      object-fit:cover;
      z-index:-2;
    }

    /* DARK LAYER */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* NAVBAR FIX */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 16px;
      background:rgba(0,0,0,0.6);
      flex-wrap:wrap;
    }

    .nav-links{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      font-weight:bold;
      font-size:14px;
      padding:5px 8px;
      border-radius:6px;
    }

    .nav-links a:hover{
      background:#22c55e;
    }

    /* CONTENT */
    .container{
      padding:30px 15px;
      text-align:center;
    }

    .box{
      max-width:500px;
      margin:20px auto;
      background:rgba(30,41,59,0.85);
      padding:20px;
      border-radius:12px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:6px;
      outline:none;
    }

    button{
      padding:10px 15px;
      border:none;
      background:#22c55e;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    button:active{
      transform:scale(0.95);
    }

  </style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAVBAR -->
<nav>
  <h3>Fun Zone</h3>

  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Policy</a>
  </div>
</nav>

<!-- CONTACT FORM -->
<div class="container">

  <h2>📞 Contact Us</h2>

  <div class="box">

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="5" placeholder="Your Message"></textarea>

    <button>Send Message</button>

  </div>

</div>

</body>
</html>
