<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      background:url('bg.jpg') no-repeat center center fixed;
      background-size:cover;
    }

    body::after{
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(0,0,0,0.7);
      padding:10px;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      margin:5px;
      font-weight:bold;
    }

    .main{
      padding:20px;
    }

    .card{
      background:rgba(30,41,59,0.85);
      padding:20px;
      margin:15px 0;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
      background:#22c55e;
    }
  </style>
</head>

<body>

<nav>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Games</a>
  </div>
</nav>

<div class="main">

  <h2>🎮 Fun Zone Games</h2>

  <!-- SNAKE -->
  <div class="card" onclick="openGame('snake.html')">
    🐍 Snake Game
  </div>

  <!-- TIC TAC TOE -->
  <div class="card" onclick="openGame('tictactoe.html')">
    ❌⭕ Tic Tac Toe Online
  </div>

  <!-- LUDO LITE -->
  <div class="card" onclick="openGame('ludo.html')">
    🎲 Ludo Lite Online
  </div>

</div>

<script>
function openGame(game){
  window.location.href = game;
}
</script>

</body>
</html>
