<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
      background: url('bg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    /* DARK OVERLAY */
    body::after {
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    /* 🔝 NAVBAR */
    nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(0,0,0,0.7);
      padding:10px 15px;
      flex-wrap:nowrap;
    }

    .nav-links {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-links a {
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:bold;
    }

    .nav-links a:hover {
      color:#22c55e;
    }

    /* 👤 PROFILE */
    .profile {
      margin-left:auto;
      position:relative;
      cursor:pointer;
    }

    .avatar {
      width:40px;
      height:40px;
      border-radius:50%;
      background:#22c55e;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
    }

    .dropdown {
      position:absolute;
      top:50px;
      right:0;
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      display:none;
      min-width:150px;
    }

    .dropdown p {
      margin:0 0 10px 0;
    }

    .dropdown button {
      width:100%;
      padding:8px;
      border:none;
      background:red;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    /* MAIN */
    .main {
      padding:20px;
    }

    .card {
      background:rgba(30,41,59,0.85);
      padding:20px;
      margin:15px 0;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover {
      transform:scale(1.05);
      background:#22c55e;
    }

    /* 📱 MOBILE FIX */
    @media(max-width:768px){
      nav {
        flex-direction:column;
        align-items:flex-start;
      }

      .profile {
        align-self:flex-end;
        margin-top:10px;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="games.html">Games</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Policy</a>
  </div>

  <div class="profile" onclick="toggleMenu()">
    <div class="avatar" id="avatar">U</div>

    <div class="dropdown" id="menu">
      <p id="name">User</p>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <h2>Welcome to Fun Zone 🎮</h2>

  <div class="card" onclick="openGame('snake.html')">🐍 Snake Game</div>
  <div class="card">❌ Tic Tac Toe</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  authDomain: "kousik-game.firebaseapp.com",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kousik-game",
  storageBucket: "kousik-game.firebasestorage.app",
  messagingSenderId: "403996094819",
  appId: "1:403996094819:web:0f6e9cf855a9c4b09d2356"
};

firebase.initializeApp(firebaseConfig);

// LOGIN CHECK
let username = localStorage.getItem("user");

if (!username) {
  window.location.href = "index.html";
}

// AVATAR LETTER
document.getElementById("avatar").innerText = username.charAt(0).toUpperCase();

// LOAD NAME
firebase.database().ref("users/" + username).once("value")
.then(snapshot => {
  if (snapshot.exists()) {
    document.getElementById("name").innerText = snapshot.val().name;
  } else {
    document.getElementById("name").innerText = username;
  }
});

// MENU TOGGLE
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// LOGOUT
function logout() {
  firebase.auth().signOut().then(() => {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  });
}

// CLOSE MENU
window.onclick = function(e) {
  if (!e.target.closest(".profile")) {
    document.getElementById("menu").style.display = "none";
  }
};

// GAME OPEN
function openGame(game){
  window.location.href = game;
}
</script>

</body>
</html>
