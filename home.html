<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
      overflow-x:hidden;
    }

    /* 🎬 VIDEO BACKGROUND */
    #bgVideo {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    /* DARK OVERLAY */
    body::after {
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    .topbar {
      background:rgba(0,0,0,0.7);
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      display:flex;
    }

    .sidebar {
      width:200px;
      background:rgba(30,41,59,0.85);
      padding:20px;
      height:100vh;
    }

    .main {
      flex:1;
      padding:20px;
    }

    .card {
      background: rgba(30,41,59,0.85);
      padding:20px;
      margin:15px 0;
      border-radius:15px;
      transition:0.3s;
      cursor:pointer;
    }

    .card:hover {
      transform: scale(1.05);
      background:#22c55e;
    }

    button {
      margin-top:10px;
      padding:10px;
      width:100%;
      border:none;
      background:red;
      color:white;
      border-radius:5px;
    }

    /* 📱 MOBILE */
    @media(max-width:768px){
      .container {
        flex-direction:column;
      }
      .sidebar {
        width:100%;
        height:auto;
      }
    }
  </style>
</head>

<body>

<!-- 🎬 VIDEO (ROOT FILE) -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="topbar">🎮 Fun Zone</div>

<div class="container">

  <div class="sidebar">
    <h3 id="name">Loading...</h3>
    <p>@<span id="username">...</span></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <h2>Games</h2>
    <div class="card">🐍 Snake Game</div>
    <div class="card">❌ Tic Tac Toe</div>
  </div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  authDomain: "kousik-game.firebaseapp.com",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kousik-game",
  storageBucket: "kousik-game.firebasestorage.app",
  messagingSenderId: "403996094819",
  appId: "1:403996094819:web:0f6e9cf855a9c4b09d2356"
};

firebase.initializeApp(firebaseConfig);

// 🔐 LOGIN CHECK
let username = localStorage.getItem("user");

if (!username) {
  window.location.href = "index.html";
}

// 👤 USERNAME SHOW
document.getElementById("username").innerText = username;

// 📥 LOAD NAME
firebase.database().ref("users/" + username).once("value")
.then(snapshot => {
  if (snapshot.exists()) {
    document.getElementById("name").innerText = snapshot.val().name;
  } else {
    document.getElementById("name").innerText = username;
  }
});

// 🚪 LOGOUT
function logout() {
  firebase.auth().signOut().then(() => {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  });
}

// 📱 MOBILE: video off (performance)
if (window.innerWidth < 768) {
  document.getElementById("bgVideo").style.display = "none";
}
</script>

</body>
</html>
