<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
    }

    #bgVideo {
      position: fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after {
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    .topbar {
      background:rgba(0,0,0,0.7);
      padding:15px;
      text-align:center;
      font-size:20px;
    }

    .container {
      display:flex;
    }

    .sidebar {
      width:220px;
      background:rgba(30,41,59,0.8);
      padding:20px;
      height:100vh;
    }

    .main {
      flex:1;
      padding:20px;
    }

    .card {
      background:rgba(30,41,59,0.8);
      padding:20px;
      margin:10px 0;
      border-radius:10px;
    }

    @media(max-width:768px){
      .container {
        flex-direction:column;
      }
      .sidebar {
        width:100%;
        height:auto;
      }
    }
  </style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="assets/bg.mp4" type="video/mp4">
</video>

<div class="topbar">🎮 Fun Zone</div>

<div class="container">

  <div class="sidebar">
    <h3 id="name">Loading...</h3>
    <p>@<span id="username"></span></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <h2>Games</h2>
    <div class="card">Snake Game</div>
    <div class="card">Tic Tac Toe</div>
  </div>

</div>

<script type="module">
import { auth } from "./firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getDatabase,
  ref,
  get
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

import { app } from "./firebase.js";

const db = getDatabase(app);

let username = localStorage.getItem("user");

if (!username) {
  window.location.href = "index.html";
}

get(ref(db, "users/" + username)).then(snapshot => {
  if (snapshot.exists()) {
    document.getElementById("name").innerText = snapshot.val().name;
    document.getElementById("username").innerText = username;
  }
});

window.logout = function() {
  signOut(auth).then(() => {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  });
}

if (window.innerWidth < 768) {
  document.getElementById("bgVideo").style.display = "none";
}
</script>

</body>
</html>
