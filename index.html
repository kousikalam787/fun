<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      color:white;
      overflow-x:hidden;
    }

    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:-1;
    }

    /* 🔥 NAV FIX */
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:16px;
      font-weight:bold;
    }

    .links{
      display:flex;
      gap:6px;
      flex-wrap:nowrap; /* 🔥 FIX */
    }

    .links a{
      color:white;
      text-decoration:none;
      padding:6px 8px;
      font-size:12px;
      background:rgba(255,255,255,0.1);
      border-radius:6px;
      white-space:nowrap; /* 🔥 FIX */
    }

    /* GRID */
    .games{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:12px;
      max-width:500px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:15px;
      overflow:hidden;
      text-align:center;
      transition:0.3s;
    }

    .card:active{
      transform:scale(0.95);
    }

    .card img{
      width:100%;
      height:110px;
      object-fit:cover;
    }

    .card p{
      padding:8px;
      font-size:13px;
    }

    /* 🎵 BUTTON FIX */
    .music-btn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#22c55e;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      z-index:10;
    }

  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<div class="nav">
  <div class="logo">🎮 Fun Zone</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<!-- GAMES -->
<div class="games">

  <div class="card" onclick="openGame('tictactoe.html')">
    <img src="tictactoe.jpg">
    <p>Tic Tac Toe</p>
  </div>

  <div class="card" onclick="openGame('snake.html')">
    <img src="snake.jpg">
    <p>Snake Pro</p>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <img src="ludo.jpg">
    <p>Ludo</p>
  </div>

</div>

<!-- SOUND -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>

<audio id="bgMusic" loop>
  <source src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<script>

// GAME OPEN
function openGame(url){
  document.getElementById("clickSound").play();
  setTimeout(()=>{ window.location.href = url; },300);
}

// 🔥 MUSIC FIX (mobile autoplay issue solved)
let music = document.getElementById("bgMusic");

function toggleMusic(){
  if(music.paused){
    music.play().then(()=>{
      localStorage.setItem("music","on");
    }).catch(()=>{});
  } else {
    music.pause();
    localStorage.setItem("music","off");
  }
}

// LOAD STATE
window.onload = ()=>{
  if(localStorage.getItem("music")==="on"){
    // autoplay block avoid → play after first touch
    document.body.addEventListener("click", ()=>{
      music.play();
    }, { once:true });
  }
};

</script>

</body>
</html>
