<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Free Online Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Fun Zone - Play free online games like Snake, Tic Tac Toe and Ludo instantly in your browser.">
  <meta name="keywords" content="free games, online games, ludo, snake game, tic tac toe, play games">

  <!-- AdSense verification (replace with your own ca-pub id) -->
  <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXX">

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      background:url('bg.jpg') no-repeat center center fixed;
      background-size:cover;
    }

    body::after{
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(0,0,0,0.7);
      padding:10px 15px;
      flex-wrap:wrap;
    }

    .nav-links{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:bold;
    }

    .nav-links a:hover{
      color:#22c55e;
    }

    .profile{
      margin-left:auto;
      position:relative;
      cursor:pointer;
    }

    .avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#22c55e;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
    }

    .dropdown{
      position:absolute;
      top:50px;
      right:0;
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      display:none;
      min-width:150px;
    }

    .dropdown button{
      width:100%;
      padding:8px;
      border:none;
      background:red;
      color:white;
      border-radius:5px;
    }

    .main{
      padding:20px;
    }

    .intro{
      margin-bottom:20px;
      font-size:16px;
      opacity:0.9;
    }

    .card{
      background:rgba(30,41,59,0.85);
      padding:20px;
      margin:15px 0;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
      font-size:18px;
    }

    .card:hover{
      transform:scale(1.05);
      background:#22c55e;
    }

    footer{
      text-align:center;
      padding:20px;
      background:rgba(0,0,0,0.8);
      margin-top:20px;
    }

    footer a{
      color:#22c55e;
      text-decoration:none;
      margin:0 5px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Policy</a>
  </div>

  <div class="profile" onclick="toggleMenu()">
    <div class="avatar" id="avatar">U</div>

    <div class="dropdown" id="menu">
      <p id="name">User</p>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <h2>🎮 Welcome to Fun Zone</h2>

  <p class="intro">
    Play free online browser games instantly without download. Enjoy Snake, Tic Tac Toe and Ludo with smooth gameplay.
  </p>

  <div class="card" onclick="openGame('snake.html')">
    🐍 Snake Game
  </div>

  <div class="card" onclick="openGame('tictactoe.html')">
    ❌⭕ Tic Tac Toe Online
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    🎲 Ludo Lite Online
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Fun Zone</p>
  <a href="privacy.html">Privacy Policy</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</footer>

<script>
function toggleMenu(){
  let m=document.getElementById("menu");
  m.style.display=m.style.display==="block"?"none":"block";
}

function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

function openGame(g){
  window.location.href=g;
}
</script>

</body>
</html>
