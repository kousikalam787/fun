<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Games Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      overflow-x:hidden;
    }

    /* VIDEO BG */
    video{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    /* NAVBAR */
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      padding:12px 15px;
      background:rgba(0,0,0,0.6);
      position:sticky;
      top:0;
      z-index:10;
    }

    .logo{
      font-weight:bold;
      font-size:18px;
    }

    .links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .links a{
      color:white;
      text-decoration:none;
      padding:6px 10px;
      border-radius:6px;
      background:rgba(255,255,255,0.1);
    }

    /* SEARCH */
    .search{
      text-align:center;
      margin:20px;
    }

    .search input{
      padding:10px;
      width:85%;
      max-width:420px;
      border-radius:8px;
      border:none;
    }

    /* GAMES GRID */
    .games{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      display:block;
      text-decoration:none;
      color:white;
      background:rgba(0,0,0,0.6);
      border-radius:15px;
      overflow:hidden;
      transition:0.25s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card:active{
      transform:scale(0.97);
    }

    .card img{
      width:100%;
      height:130px;
      object-fit:cover;
    }

    .card p{
      margin:0;
      padding:10px;
      text-align:center;
      font-weight:bold;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:20px;
      background:rgba(0,0,0,0.7);
      margin-top:20px;
    }
  </style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<div class="nav">
  <div class="logo">🎮 Fun Zone</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" id="search" placeholder="Search games..." onkeyup="searchGame()">
</div>

<!-- GAMES -->
<div class="games">

  <!-- ✅ FIXED LINK -->
  <a class="card" data-name="tic tac toe" href="tictactoe.html">
    <img src="tic.jpg">
    <p>Tic Tac Toe</p>
  </a>

  <a class="card" data-name="snake" href="snake.html">
    <img src="snake.jpg">
    <p>Snake Pro</p>
  </a>

  <a class="card" data-name="ludo" href="ludo.html">
    <img src="ludo.jpg">
    <p>Ludo</p>
  </a>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Fun Zone | All Rights Reserved
</div>

<script>
function searchGame(){
  let input=document.getElementById("search").value.toLowerCase();
  let cards=document.querySelectorAll(".card");

  cards.forEach(card=>{
    let name=card.getAttribute("data-name");
    card.style.display=name.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
