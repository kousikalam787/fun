<!DOCTYPE html>
<html>
<head>
  <title>Login - Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
      overflow:hidden;
    }

    video {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    .overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      top:0;
      left:0;
    }

    .box {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:rgba(0,0,0,0.75);
      padding:25px;
      border-radius:15px;
      width:90%;
      max-width:320px;
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:5px;
      outline:none;
    }

    button {
      width:100%;
      padding:10px;
      background:#22c55e;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    .toggle {
      margin-top:10px;
      cursor:pointer;
      font-size:14px;
      color:#22c55e;
    }
  </style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- BOX -->
<div class="box">
  <h2 id="title">Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="submit()">Login</button>

  <div class="toggle" onclick="toggleMode()">Don't have account? Register</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isLogin = true;

// TOGGLE
function toggleMode(){
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector("button").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".toggle").innerText =
    isLogin ? "Don't have account? Register" : "Already have account? Login";
}

// MAIN FUNCTION
function submit(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  console.log("Trying:", user);

  if(!user || !pass){
    alert("Fill all fields");
    return;
  }

  let ref = db.ref("users/" + user);

  if(isLogin){
    // LOGIN
    ref.get()
    .then(snapshot => {
      console.log("Data:", snapshot.val());

      if(!snapshot.exists()){
        alert("User not found");
        return;
      }

      let data = snapshot.val();

      if(!data.password){
        alert("Data corrupted");
        return;
      }

      if(data.password !== pass){
        alert("Wrong password");
        return;
      }

      // SUCCESS
      localStorage.setItem("user", user);
      alert("Login success ✅");
      window.location.href = "home.html";
    })
    .catch(error => {
      console.error(error);
      alert("Firebase error (check console)");
    });

  } else {
    // REGISTER
    ref.get().then(snapshot => {
      if(snapshot.exists()){
        alert("Username already taken");
        return;
      }

      ref.set({
        password: pass,
        name: user
      })
      .then(() => {
        alert("Registered successfully ✅");
        toggleMode();
      })
      .catch(err=>{
        console.error(err);
        alert("Register error");
      });
    });
  }
}
</script>

</body>
</html>
