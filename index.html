<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      width:300px;
      max-width:90%;
    }

    input {
      width:100%;
      margin:8px 0;
      padding:10px;
      border:none;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#22c55e;
      border:none;
      color:white;
      cursor:pointer;
    }

    #msg {
      margin-top:10px;
      color:red;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎮 Fun Zone</h2>

  <input id="name" placeholder="Your Name">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<!-- 🔥 FIREBASE SCRIPT (NO MODULE ISSUE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  authDomain: "kousik-game.firebaseapp.com",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kousik-game",
  storageBucket: "kousik-game.firebasestorage.app",
  messagingSenderId: "403996094819",
  appId: "1:403996094819:web:0f6e9cf855a9c4b09d2356"
};

firebase.initializeApp(firebaseConfig);

function msg(t){
  document.getElementById("msg").innerText = t;
}

// REGISTER
function register() {
  let name = document.getElementById("name").value.trim();
  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!name || !username || !password) {
    return msg("All fields required");
  }

  let email = username + "@gmail.com";

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      firebase.database().ref("users/" + username).set({
        name: name,
        username: username
      });

      localStorage.setItem("user", username);
      window.location.href = "home.html";
    })
    .catch(e => {
      msg(e.message);
      console.log(e);
    });
}

// LOGIN
function login() {
  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!username || !password) {
    return msg("Enter username & password");
  }

  let email = username + "@gmail.com";

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      localStorage.setItem("user", username);
      window.location.href = "home.html";
    })
    .catch(e => {
      msg("Invalid username or password");
      console.log(e);
    });
}
</script>

</body>
</html>
