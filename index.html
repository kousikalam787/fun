<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Free Online Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

    body{color:white;overflow:hidden;}

    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:-1;
    }

    /* PAGE WRAP (for swipe) */
    #page{
      transition:0.5s ease;
    }

    /* NAV */
    .nav{
      display:flex;
      justify-content:space-between;
      padding:12px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
    }

    .links a{
      color:white;
      text-decoration:none;
      margin-left:6px;
      padding:6px 10px;
      background:rgba(255,255,255,0.1);
      border-radius:8px;
    }

    /* MUSIC BTN */
    .music-btn{
      position:fixed;
      bottom:15px;
      right:15px;
      background:#22c55e;
      padding:10px;
      border-radius:50%;
      z-index:10;
      cursor:pointer;
    }

    /* GRID */
    .games{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:15px;
      padding:15px;
      max-width:900px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:15px;
      overflow:hidden;
      text-align:center;
      transition:0.3s;
    }

    /* 🔥 PREVIEW ANIMATION */
    .card:active{
      transform:scale(0.95);
      box-shadow:0 0 20px #22c55e;
    }

    .card img{
      width:100%;
      height:110px;
      object-fit:cover;
    }

    .card p{
      padding:8px;
    }

    /* SWIPE TRANSITION */
    .slide-out{
      transform:translateX(-100%);
      opacity:0;
    }

    .slide-in{
      transform:translateX(100%);
    }

  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div id="page">

<div class="nav">
  <div>🎮 Fun Zone</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<div class="games">

  <div class="card" onclick="openGame('tictactoe.html')">
    <img src="tictactoe.jpg">
    <p>Tic Tac Toe</p>
  </div>

  <div class="card" onclick="openGame('snake.html')">
    <img src="snake.jpg">
    <p>Snake Pro</p>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <img src="ludo.jpg">
    <p>Ludo</p>
  </div>

</div>

</div>

<!-- 🔊 CLICK SOUND -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<script>

// GAME OPEN WITH SWIPE
function openGame(url){
  document.getElementById("clickSound").play();

  const page = document.getElementById("page");
  page.classList.add("slide-out");

  setTimeout(()=>{
    window.location.href = url;
  },500);
}

// MUSIC SYSTEM
let music = document.getElementById("bgMusic");

function toggleMusic(){
  if(music.paused){
    music.play();
    localStorage.setItem("music","on");
  } else {
    music.pause();
    localStorage.setItem("music","off");
  }
}

// LOAD MUSIC STATE
window.onload = ()=>{
  if(localStorage.getItem("music")==="on"){
    music.play();
  }
};

</script>

</body>
</html>
