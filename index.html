<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Free Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Play free online games like Snake, Tic Tac Toe, and Ludo instantly.">
  <meta name="keywords" content="free games, online games, ludo, snake, tic tac toe">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    /* NAV */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 18px;
      background:#111827;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav h2{
      margin:0;
      font-size:18px;
      color:#22c55e;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      margin-left:12px;
      font-size:14px;
    }

    .nav-links a:hover{
      color:#22c55e;
    }

    /* HERO */
    .hero{
      padding:20px;
      text-align:center;
    }

    .hero h1{
      margin:10px 0;
      font-size:24px;
    }

    .hero p{
      font-size:14px;
      opacity:0.8;
      max-width:500px;
      margin:auto;
    }

    /* GAME GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:#1f2937;
      padding:20px;
      border-radius:15px;
      text-align:center;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    .card:hover{
      transform:translateY(-5px);
      background:#22c55e;
      color:black;
    }

    .emoji{
      font-size:30px;
      margin-bottom:10px;
    }

    .title{
      font-size:14px;
      font-weight:bold;
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:20px;
      background:#111827;
      margin-top:20px;
      font-size:12px;
      opacity:0.8;
    }

    footer a{
      color:#22c55e;
      text-decoration:none;
      margin:0 5px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>🎮 Fun Zone</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="privacy.html">Policy</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Play Free Online Games</h1>
  <p>Enjoy smooth browser games anytime without download. Fun Zone brings simple and fast gaming experience.</p>
</div>

<!-- GAME GRID -->
<div class="grid">

  <div class="card" onclick="openGame('snake.html')">
    <div class="emoji">🐍</div>
    <div class="title">Snake Game</div>
  </div>

  <div class="card" onclick="openGame('tictactoe.html')">
    <div class="emoji">❌⭕</div>
    <div class="title">Tic Tac Toe</div>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <div class="emoji">🎲</div>
    <div class="title">Ludo Lite</div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Fun Zone |
  <a href="about.html">About</a>
  <a href="privacy.html">Privacy</a>
  <a href="contact.html">Contact</a>
</footer>

<script>
function openGame(g){
  window.location.href = g;
}
</script>

</body>
</html>
