<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Games Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      overflow-x:hidden;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* VIDEO */
    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    /* NAV */
    .nav{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      padding:10px;
      background:rgba(0,0,0,0.6);
    }

    .links{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .links a{
      color:white;
      text-decoration:none;
      padding:5px 8px;
      font-size:13px;
      background:rgba(255,255,255,0.1);
      border-radius:5px;
    }

    /* SEARCH */
    .search{
      text-align:center;
      margin:10px;
    }

    .search input{
      padding:8px;
      width:75%;
      border-radius:6px;
      border:none;
    }

    /* 🔥 SMALL GRID FIX */
    .games{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:10px;
      padding:10px;
      flex:1;
      max-width:900px;
      margin:auto;
    }

    .card{
      background:rgba(0,0,0,0.6);
      border-radius:10px;
      overflow:hidden;
      text-decoration:none;
      color:white;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    /* 🔥 SMALL IMAGE */
    .card img{
      width:100%;
      height:80px;
      object-fit:cover;
    }

    .card p{
      text-align:center;
      padding:6px;
      font-size:13px;
      margin:0;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:12px;
      background:rgba(0,0,0,0.7);
      margin-top:auto;
      font-size:13px;
    }
  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="nav">
  <div>🎮 Fun Zone</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<div class="search">
  <input type="text" placeholder="Search games..." onkeyup="searchGame(this.value)">
</div>

<div class="games">

  <a class="card" data-name="tic tac toe" href="tictactoe.html">
    <img src="tictactoe.jpg">
    <p>Tic Tac Toe</p>
  </a>

  <a class="card" data-name="snake" href="snake.html">
    <img src="snake.jpg">
    <p>Snake Pro</p>
  </a>

  <a class="card" data-name="ludo" href="ludo.html">
    <img src="ludo.jpg">
    <p>Ludo</p>
  </a>

</div>

<div class="footer">
  © 2026 Fun Zone
</div>

<script>
function searchGame(val){
  val = val.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.dataset.name.includes(val) ? "block" : "none";
  });
}
</script>

</body>
</html>
