<!DOCTYPE html>
<html>
<head>
  <title>Login - Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
      overflow:hidden;
    }

    /* 🎥 VIDEO BACKGROUND */
    video {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    /* DARK OVERLAY */
    .overlay {
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      top:0;
      left:0;
    }

    /* LOGIN BOX */
    .box {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:rgba(0,0,0,0.7);
      padding:25px;
      border-radius:15px;
      width:90%;
      max-width:300px;
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:5px;
      outline:none;
    }

    button {
      width:100%;
      padding:10px;
      background:#22c55e;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    .toggle {
      margin-top:10px;
      cursor:pointer;
      font-size:14px;
      color:#22c55e;
    }
  </style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- LOGIN BOX -->
<div class="box">
  <h2 id="title">Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="submit()">Login</button>

  <div class="toggle" onclick="toggleMode()">Don't have account? Register</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  authDomain: "kousik-game.firebaseapp.com",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kousik-game"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isLogin = true;

// TOGGLE LOGIN / REGISTER
function toggleMode(){
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector("button").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".toggle").innerText =
    isLogin ? "Don't have account? Register" : "Already have account? Login";
}

// SUBMIT
function submit(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  if(!user || !pass){
    alert("Fill all fields");
    return;
  }

  let ref = db.ref("users/" + user);

  if(isLogin){
    // LOGIN
    ref.once("value").then(snap=>{
      if(!snap.exists()){
        alert("User not found");
      } else if(snap.val().password !== pass){
        alert("Wrong password");
      } else {
        localStorage.setItem("user", user);
        window.location.href = "home.html";
      }
    });
  } else {
    // REGISTER
    ref.once("value").then(snap=>{
      if(snap.exists()){
        alert("Username already taken");
      } else {
        ref.set({
          password: pass,
          name: user
        });
        alert("Registered! Now login");
        toggleMode();
      }
    });
  }
}
</script>

</body>
</html>
