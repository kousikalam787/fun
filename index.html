<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ AdSense -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: "ca-pub-5985676857185797",
      enable_page_level_ads: true
    });
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{color:white;}

    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:-1;
    }

    .nav{
      padding:12px;
      text-align:center;
      background:rgba(0,0,0,0.6);
      font-weight:bold;
    }

    /* 🔥 AD BOX */
    .ad{
      margin:10px auto;
      max-width:100%;
      text-align:center;
    }

    /* GRID */
    .games{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:12px;
      max-width:500px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.1);
      border-radius:12px;
      overflow:hidden;
      text-align:center;
    }

    .card img{
      width:100%;
      height:100px;
      object-fit:cover;
    }

    .card p{padding:8px;}

    /* 🔥 STICKY FOOTER AD SPACE */
    .footer-space{
      height:80px;
    }

  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="nav">🎮 Fun Zone</div>

<!-- 🔥 ABOVE THE FOLD AD -->
<div class="ad">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-5985676857185797"
    data-ad-slot="TOP_SLOT_ID"
    data-ad-format="auto"
    data-full-width-responsive="true"></ins>
</div>

<div class="games">

  <div class="card" onclick="openGame('tictactoe.html')">
    <img src="tictactoe.jpg"><p>Tic Tac Toe</p>
  </div>

  <div class="card" onclick="openGame('snake.html')">
    <img src="snake.jpg"><p>Snake Pro</p>
  </div>

  <!-- 🔥 MID AD (HIGH RPM SPOT) -->
  <div class="ad" style="grid-column: span 2;">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-5985676857185797"
      data-ad-slot="MID_SLOT_ID"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <img src="ludo.jpg"><p>Ludo</p>
  </div>

</div>

<!-- spacing for anchor ads -->
<div class="footer-space"></div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});

function openGame(url){
  setTimeout(()=>{ window.location.href = url; },200);
}
</script>

</body>
</html>
