<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Games Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      overflow-x:hidden;
    }

    /* VIDEO BG */
    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    /* NAV */
    .nav{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      padding:12px;
      background:rgba(0,0,0,0.6);
    }

    .links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .links a{
      color:white;
      text-decoration:none;
      padding:6px 10px;
      background:rgba(255,255,255,0.1);
      border-radius:6px;
    }

    /* SEARCH */
    .search{
      text-align:center;
      margin:15px;
    }

    .search input{
      padding:10px;
      width:80%;
      border-radius:8px;
      border:none;
    }

    /* GAMES */
    .games{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:15px;
      padding:15px;
    }

    .card{
      background:rgba(0,0,0,0.6);
      border-radius:12px;
      overflow:hidden;
      text-decoration:none;
      color:white;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    /* 🔥 IMAGE FIX */
    .card img{
      width:100%;
      height:110px;        /* size control */
      object-fit:cover;    /* perfect fit */
      display:block;
    }

    .card p{
      text-align:center;
      padding:8px;
      font-size:14px;
      margin:0;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:15px;
      background:rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<div class="nav">
  <div>🎮 Fun Zone</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" placeholder="Search games..." onkeyup="searchGame(this.value)">
</div>

<!-- GAMES -->
<div class="games" id="games">

  <!-- ✅ FIXED IMAGE NAME -->
  <a class="card" data-name="tic tac toe" href="tictactoe.html">
    <img src="tictactoe.jpg">
    <p>Tic Tac Toe</p>
  </a>

  <a class="card" data-name="snake" href="snake.html">
    <img src="snake.jpg">
    <p>Snake Pro</p>
  </a>

  <a class="card" data-name="ludo" href="ludo.html">
    <img src="ludo.jpg">
    <p>Ludo</p>
  </a>

</div>

<div class="footer">
  © 2026 Fun Zone
</div>

<script>
function searchGame(val){
  val = val.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.dataset.name.includes(val) ? "block" : "none";
  });
}
</script>

</body>
</html>
