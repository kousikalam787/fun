<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ AdSense + Auto Ads -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: "ca-pub-5985676857185797",
      enable_page_level_ads: true
    });
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{color:white;}

    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:-1;
    }

    .nav{
      display:flex;
      justify-content:space-between;
      padding:12px;
      background:rgba(0,0,0,0.6);
    }

    .games{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:12px;
      max-width:500px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.1);
      border-radius:12px;
      text-align:center;
      overflow:hidden;
    }

    .card img{
      width:100%;
      height:100px;
      object-fit:cover;
    }

    .card p{padding:8px;}

    /* 🔥 LOADER */
    #loader{
      position:fixed;
      inset:0;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
      display:none;
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #1e293b;
      border-top:4px solid #22c55e;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{transform:rotate(360deg);}
    }

  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="nav">🎮 Fun Zone</div>

<div class="games">
  <div class="card" onclick="openGame('tictactoe.html')">
    <img src="tictactoe.jpg"><p>Tic Tac Toe</p>
  </div>

  <div class="card" onclick="openGame('snake.html')">
    <img src="snake.jpg"><p>Snake Pro</p>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <img src="ludo.jpg"><p>Ludo</p>
  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p style="margin-top:10px;">Loading...</p>
</div>

<script>
function openGame(url){
  document.getElementById("loader").style.display="flex";

  setTimeout(()=>{
    window.location.href = url;
  },1200); // smooth delay
}
</script>

</body>
</html>
