<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ AdSense Main Script + Auto Ads -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5985676857185797"
    crossorigin="anonymous"></script>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: "ca-pub-5985676857185797",
      enable_page_level_ads: true
    });
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{color:white;overflow-x:hidden;}

    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:-1;
    }

    /* NAV */
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
      z-index:10;
    }

    .logo{font-size:16px;font-weight:bold;}
    .menu-btn{font-size:20px;cursor:pointer;}

    /* SIDEBAR */
    .menu{
      position:fixed;
      top:0;
      right:-220px;
      width:220px;
      height:100%;
      background:#020617;
      padding:20px;
      transition:0.3s;
      z-index:20;
    }

    .menu.active{ right:0; }

    .menu a{
      display:block;
      margin:15px 0;
      color:white;
      text-decoration:none;
      font-size:14px;
      background:rgba(255,255,255,0.1);
      padding:10px;
      border-radius:8px;
    }

    /* COUNT */
    .count{
      text-align:center;
      margin:10px;
      font-size:14px;
      opacity:0.8;
    }

    /* GRID */
    .games{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      padding:12px;
      max-width:500px;
      margin:auto;
    }

    .card{
      position:relative;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:15px;
      overflow:hidden;
      text-align:center;
      transform:translateY(30px);
      opacity:0;
      transition:0.5s;
    }

    .card.show{
      transform:translateY(0);
      opacity:1;
    }

    .card img{
      width:100%;
      height:110px;
      object-fit:cover;
    }

    .card p{padding:8px;font-size:13px;}

    .badge{
      position:absolute;
      top:8px;
      left:8px;
      background:#22c55e;
      padding:3px 6px;
      font-size:10px;
      border-radius:5px;
    }

    /* ADS */
    .ad-box{
      text-align:center;
      margin:15px;
    }

    /* MUSIC */
    .music-btn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#22c55e;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      z-index:10;
    }

  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<div class="nav">
  <div class="logo">🎮 Fun Zone</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
</div>

<div class="count">🎮 Total Games: 3</div>

<!-- 🔥 BANNER AD -->
<div class="ad-box">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-5985676857185797"
    data-ad-slot="1234567890"
    data-ad-format="auto"
    data-full-width-responsive="true"></ins>
</div>

<!-- GAMES -->
<div class="games">

  <div class="card" onclick="openGame('tictactoe.html')">
    <span class="badge">NEW</span>
    <img src="tictactoe.jpg">
    <p>Tic Tac Toe</p>
  </div>

  <div class="card" onclick="openGame('snake.html')">
    <span class="badge">HOT</span>
    <img src="snake.jpg">
    <p>Snake Pro</p>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <span class="badge">ONLINE</span>
    <img src="ludo.jpg">
    <p>Ludo</p>
  </div>

</div>

<!-- AUDIO -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>

<audio id="bgMusic" loop>
  <source src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<script>

// INIT ADS
(adsbygoogle = window.adsbygoogle || []).push({});

// MENU
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

// GAME OPEN
function openGame(url){
  document.getElementById("clickSound").play();
  setTimeout(()=>{ window.location.href = url; },300);
}

// MUSIC
let music = document.getElementById("bgMusic");

function toggleMusic(){
  if(music.paused){
    music.play().then(()=> localStorage.setItem("music","on"));
  } else {
    music.pause();
    localStorage.setItem("music","off");
  }
}

window.onload = ()=>{
  if(localStorage.getItem("music")==="on"){
    document.body.addEventListener("click", ()=>{
      music.play();
    }, { once:true });
  }

  // SCROLL ANIMATION
  let cards = document.querySelectorAll(".card");
  window.addEventListener("scroll", ()=>{
    cards.forEach(card=>{
      let top = card.getBoundingClientRect().top;
      if(top < window.innerHeight - 50){
        card.classList.add("show");
      }
    });
  });

  window.dispatchEvent(new Event("scroll"));
};

</script>

</body>
</html>
