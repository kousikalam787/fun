<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Free Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }

    /* 🎥 VIDEO BACKGROUND */
    .video-bg{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    /* DARK OVERLAY */
    body::after{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* NAV */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 18px;
      background:rgba(0,0,0,0.6);
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav h2{
      margin:0;
      font-size:18px;
      color:#22c55e;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      margin-left:12px;
      font-size:14px;
    }

    .nav-links a:hover{
      color:#22c55e;
    }

    /* HERO */
    .hero{
      padding:20px;
      text-align:center;
    }

    .hero h1{
      font-size:24px;
      margin:10px 0;
    }

    .hero p{
      font-size:14px;
      opacity:0.85;
      max-width:500px;
      margin:auto;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
      gap:15px;
      padding:20px;
      flex:1;
    }

    .card{
      background:rgba(31,41,55,0.85);
      border-radius:15px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.4);
    }

    .card:hover{
      transform:translateY(-5px);
      background:#22c55e;
      color:black;
    }

    .thumb{
      width:100%;
      height:140px;
      object-fit:cover;
      display:block;
    }

    .title{
      padding:10px;
      font-size:14px;
      font-weight:bold;
    }

    /* FOOTER */
    footer{
      text-align:center;
      padding:15px;
      background:rgba(0,0,0,0.7);
      font-size:12px;
    }

    footer a{
      color:#22c55e;
      text-decoration:none;
      margin:0 5px;
    }
  </style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video class="video-bg" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<nav>
  <h2>🎮 Fun Zone</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="privacy.html">Policy</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Play Free Online Games</h1>
  <p>Enjoy smooth browser games instantly without download. Fun Zone brings fast and fun gaming experience.</p>
</div>

<!-- GAMES -->
<div class="grid">

  <div class="card" onclick="openGame('snake.html')">
    <img src="snake.jpg" class="thumb">
    <div class="title">🐍 Snake Game</div>
  </div>

  <div class="card" onclick="openGame('tictactoe.html')">
    <img src="tictactoe.jpg" class="thumb">
    <div class="title">❌⭕ Tic Tac Toe</div>
  </div>

  <div class="card" onclick="openGame('ludo.html')">
    <img src="ludo.jpg" class="thumb">
    <div class="title">🎲 Ludo Lite</div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Fun Zone |
  <a href="about.html">About</a>
  <a href="privacy.html">Privacy</a>
  <a href="contact.html">Contact</a>
</footer>

<script>
function openGame(g){
  window.location.href = g;
}
</script>

</body>
</html>
