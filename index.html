<!DOCTYPE html>
<html>
<head>
  <title>Fun Zone - Play Free Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* VIDEO BG */
    .video-bg{
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      object-fit:cover;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* NAV */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 18px;
      background:rgba(0,0,0,0.6);
    }

    nav h2{
      margin:0;
      color:#22c55e;
      font-size:18px;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      margin-left:12px;
      font-size:14px;
    }

    /* 🔍 SEARCH BAR */
    .search-box{
      text-align:center;
      padding:15px;
    }

    .search-box input{
      width:80%;
      max-width:400px;
      padding:10px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:14px;
    }

    /* HERO */
    .hero{
      text-align:center;
      padding:10px;
    }

    .hero h1{
      margin:10px 0;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
      gap:15px;
      padding:20px;
      flex:1;
    }

    .card{
      background:rgba(31,41,55,0.85);
      border-radius:15px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
      text-align:center;
    }

    .card:hover{
      transform:translateY(-5px);
      background:#22c55e;
      color:black;
    }

    .thumb{
      width:100%;
      height:140px;
      object-fit:cover;
    }

    .title{
      padding:10px;
      font-size:14px;
      font-weight:bold;
    }

    footer{
      text-align:center;
      padding:15px;
      background:rgba(0,0,0,0.7);
      font-size:12px;
    }
  </style>
</head>

<body>

<!-- VIDEO -->
<video class="video-bg" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<nav>
  <h2>🎮 Fun Zone</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="privacy.html">Policy</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Play Free Online Games</h1>
</div>

<!-- 🔍 SEARCH -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search games... (snake, ludo, tic tac toe)">
</div>

<!-- GAMES -->
<div class="grid" id="gameGrid">

  <div class="card" data-name="snake" onclick="openGame('snake.html')">
    <img src="snake.jpg" class="thumb">
    <div class="title">🐍 Snake Game</div>
  </div>

  <div class="card" data-name="tictactoe tic tac toe" onclick="openGame('tictactoe.html')">
    <img src="tictactoe.jpg" class="thumb">
    <div class="title">❌⭕ Tic Tac Toe</div>
  </div>

  <div class="card" data-name="ludo dice" onclick="openGame('ludo.html')">
    <img src="ludo.jpg" class="thumb">
    <div class="title">🎲 Ludo Lite</div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Fun Zone | All Rights Reserved
</footer>

<script>
function openGame(g){
  window.location.href=g;
}

/* 🔍 SEARCH FUNCTION */
document.getElementById("search").addEventListener("input", function(){
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    let name = card.getAttribute("data-name");
    if(name.includes(value)){
      card.style.display="block";
    }else{
      card.style.display="none";
    }
  });
});
</script>

</body>
</html>
