<!DOCTYPE html>
<html>
<head>
  <title>Snake Game PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      background:url('bgn.jpg') center/cover fixed;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    canvas{
      margin-top:15px;
      border-radius:12px;
      background:url('box.jpg') center/cover;
    }

    .score{
      margin:10px;
    }

    button{
      padding:10px 16px;
      margin:5px;
      border:none;
      border-radius:6px;
      background:#22c55e;
      color:white;
    }

    .controls button{
      width:60px;
      height:60px;
      font-size:20px;
      background:#1e293b;
      color:white;
    }

    .controls button:active{
      background:#22c55e;
    }

    #startScreen{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.92);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #gameOver{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
    }
  </style>
</head>

<body>

<h2>🐍 Snake Game PRO</h2>
<div class="score">Score: <span id="score">0</span></div>

<canvas id="game" width="300" height="300"></canvas>

<br>
<button onclick="restart()">Restart</button>

<div id="startScreen">
  <h2>Start Game</h2>
  <button onclick="start()">PLAY</button>
</div>

<div id="gameOver">
  <h2>Game Over 💀</h2>
  <p>Score: <span id="final"></span></p>
  <button onclick="restart()">Play Again</button>
</div>

<div class="controls">
  <button onclick="dir('up')">⬆️</button><br>
  <button onclick="dir('left')">⬅️</button>
  <button onclick="dir('down')">⬇️</button>
  <button onclick="dir('right')">➡️</button>
</div>

<script>

const c=document.getElementById("game");
const ctx=c.getContext("2d");

let snake=[],food,d="RIGHT",score=0,game;
let box=15;
let speed=110;

/* 🍎 APPLE IMAGE */
let apple=new Image();
apple.src="apple.png";

/* START */
function start(){
  document.getElementById("startScreen").style.display="none";
  init();
}

/* INIT */
function init(){
  clearInterval(game);

  snake=[{x:150,y:150}];
  d="RIGHT";
  score=0;
  food=random();

  document.getElementById("score").innerText=0;
  document.getElementById("gameOver").style.display="none";

  game=setInterval(loop,speed);
}

function random(){
  return{
    x:Math.floor(Math.random()*20)*box,
    y:Math.floor(Math.random()*20)*box
  };
}

/* LOOP */
function loop(){

  ctx.clearRect(0,0,300,300);

  snake.forEach((s,i)=>{
    ctx.fillStyle=i? "#4ade80":"#22c55e";
    ctx.fillRect(s.x,s.y,box,box);
  });

  /* 🍎 FIXED SMALL APPLE (IMPORTANT PART) */
  if(apple.complete){
    ctx.drawImage(
      apple,
      food.x+2,   // center fix
      food.y+2,
      box-4,      // small fit
      box-4
    );
  }else{
    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,box,box);
  }

  let x=snake[0].x;
  let y=snake[0].y;

  if(d==="LEFT")x-=box;
  if(d==="RIGHT")x+=box;
  if(d==="UP")y-=box;
  if(d==="DOWN")y+=box;

  if(x<0||y<0||x>=300||y>=300||hit(x,y)){
    over();
    return;
  }

  if(x===food.x&&y===food.y){
    score++;
    document.getElementById("score").innerText=score;
    food=random();
  }else snake.pop();

  snake.unshift({x,y});
}

/* CONTROL */
function dir(x){
  if(x==="left" && d!=="RIGHT") d="LEFT";
  if(x==="right" && d!=="LEFT") d="RIGHT";
  if(x==="up" && d!=="DOWN") d="UP";
  if(x==="down" && d!=="UP") d="DOWN";
}

/* COLLISION */
function hit(x,y){
  return snake.some(s=>s.x===x&&s.y===y);
}

/* GAME OVER */
function over(){
  clearInterval(game);
  document.getElementById("final").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

/* RESTART */
function restart(){
  init();
}

</script>

</body>
</html>
