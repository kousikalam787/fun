<!DOCTYPE html>
<html>
<head>
  <title>Snake Game PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      text-align:center;

      /* 🌄 BACKGROUND */
      background:url('bgn.jpg') no-repeat center center fixed;
      background-size:cover;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    h1{ margin-top:10px; }

    canvas{
      margin-top:15px;
      border-radius:12px;

      /* 🟫 BOX IMAGE FIT FIX */
      background:url('box.jpg') center/cover no-repeat;
      box-shadow:0 10px 25px rgba(0,0,0,0.6);
    }

    .score{
      margin-top:10px;
      font-size:18px;
    }

    button{
      margin-top:10px;
      padding:10px 18px;
      border:none;
      background:#22c55e;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    /* 🎮 START SCREEN */
    #startScreen{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.92);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .diff button{
      margin:8px;
      width:120px;
    }

    .selected{
      background:#16a34a !important;
    }

    /* GAME OVER */
    #gameOver{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:9998;
    }

    /* 🎯 LOADING */
    #loadingScreen{
      position:fixed;
      inset:0;
      background:url('bgk.jpg') center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100000;
    }

    #loadingScreen::after{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.6);
    }

    .box{
      position:relative;
      z-index:1;
      width:80%;
      max-width:300px;
      text-align:center;
    }

    .bar{
      width:100%;
      height:12px;
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
      margin-top:12px;
    }

    #barFill{
      width:0%;
      height:100%;
      background:#22c55e;
      transition:0.2s;
    }

    #percent{
      margin-top:10px;
    }

    /* CONTROLS */
    .controls button{
      width:60px;
      height:60px;
      margin:5px;
      font-size:20px;
      border-radius:10px;
      background:#1e293b;
      color:white;
    }

    .controls button:active{
      background:#22c55e;
    }
  </style>
</head>

<body>

<!-- 🚀 LOADING -->
<div id="loadingScreen">
  <div class="box">
    <h2>🐍 Loading Game...</h2>
    <div class="bar">
      <div id="barFill"></div>
    </div>
    <div id="percent">0%</div>
  </div>
</div>

<h1>🐍 Snake Game PRO</h1>
<div class="score">Score: <span id="score">0</span></div>

<canvas id="game" width="300" height="300"></canvas>

<br>
<button onclick="restart()">Restart</button>

<!-- START -->
<div id="startScreen">
  <h2>🐍 Snake Game</h2>
  <p>Select Difficulty</p>

  <div class="diff">
    <button onclick="setDiff('easy',this)">Easy</button>
    <button onclick="setDiff('medium',this)">Medium</button>
    <button onclick="setDiff('hard',this)">Hard</button>
  </div>

  <button onclick="start()">PLAY</button>
</div>

<!-- GAME OVER -->
<div id="gameOver">
  <h2>Game Over 💀</h2>
  <p>Score: <span id="final"></span></p>
  <button onclick="restart()">Play Again</button>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="dir('up')">⬆️</button><br>
  <button onclick="dir('left')">⬅️</button>
  <button onclick="dir('down')">⬇️</button>
  <button onclick="dir('right')">➡️</button>
</div>

<script>

/* 🔥 LOADING 0-100 */
let load=0;
let loadInt=setInterval(()=>{
  load++;
  document.getElementById("barFill").style.width=load+"%";
  document.getElementById("percent").innerText=load+"%";

  if(load>=100){
    clearInterval(loadInt);
    setTimeout(()=>{
      document.getElementById("loadingScreen").style.display="none";
    },300);
  }
},15);

/* GAME */
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let box=15;
let snake=[];
let food;
let d="RIGHT";
let score=0;
let speed=110;
let game;

/* DIFF */
function setDiff(l,b){
  document.querySelectorAll(".diff button").forEach(x=>x.classList.remove("selected"));
  b.classList.add("selected");

  if(l==="easy") speed=150;
  if(l==="medium") speed=110;
  if(l==="hard") speed=70;
}

/* START */
function start(){
  document.getElementById("startScreen").style.display="none";
  init();
}

/* INIT */
function init(){
  clearInterval(game);

  snake=[{x:150,y:150}];
  d="RIGHT";
  score=0;
  food=random();

  document.getElementById("score").innerText=0;
  document.getElementById("gameOver").style.display="none";

  game=setInterval(draw,speed);
}

function random(){
  return{
    x:Math.floor(Math.random()*20)*box,
    y:Math.floor(Math.random()*20)*box
  };
}

/* DRAW */
function draw(){
  ctx.clearRect(0,0,300,300);

  snake.forEach((s,i)=>{
    ctx.fillStyle=i? "#4ade80":"#22c55e";
    ctx.fillRect(s.x,s.y,box,box);
  });

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);

  let x=snake[0].x;
  let y=snake[0].y;

  if(d==="LEFT")x-=box;
  if(d==="RIGHT")x+=box;
  if(d==="UP")y-=box;
  if(d==="DOWN")y+=box;

  if(x<0||y<0||x>=300||y>=300||self(x,y)){
    over();
    return;
  }

  if(x===food.x&&y===food.y){
    score++;
    document.getElementById("score").innerText=score;
    food=random();
  }else snake.pop();

  snake.unshift({x,y});
}

function self(x,y){
  return snake.some(s=>s.x===x&&s.y===y);
}

/* CONTROL */
function dir(x){
  if(x==="left"&&d!=="RIGHT")d="LEFT";
  if(x==="right"&&d!=="LEFT")d="RIGHT";
  if(x==="up"&&d!=="DOWN")d="UP";
  if(x==="down"&&d!=="UP")d="DOWN";
}

/* GAME OVER */
function over(){
  clearInterval(game);
  document.getElementById("final").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

/* RESTART */
function restart(){
  init();
}

</script>

</body>
</html>
