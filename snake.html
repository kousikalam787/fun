<!DOCTYPE html>
<html>
<head>
  <title>Snake PRO - Slow Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      background:url('bgn.jpg') center/cover fixed;
      overflow:hidden;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    h2{ margin-top:10px; }

    canvas{
      margin-top:10px;
      border-radius:12px;
      background:url('box.jpg') center/cover;
      display:block;
      margin:auto;
    }

    .score{
      margin:5px;
      font-size:18px;
    }

    button{
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:6px;
      background:#22c55e;
      color:white;
      cursor:pointer;
      position:relative;
      z-index:100;
      touch-action:manipulation;
    }

    button:active{ transform:scale(0.95); }

    .controls{
      margin-top:10px;
      position:relative;
      z-index:100;
    }

    .controls button{
      width:60px;
      height:60px;
      font-size:20px;
      background:#1e293b;
    }

    .controls button:active{
      background:#22c55e;
    }

    #startScreen{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.92);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #gameOver{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
    }

    #loadingScreen{
      position:fixed;
      inset:0;
      background:url('bgk.jpg') center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:99999;
    }

    #loadingScreen::after{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.6);
    }

    .box{
      position:relative;
      z-index:1;
      width:80%;
      max-width:300px;
      text-align:center;
    }

    .bar{
      width:100%;
      height:12px;
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
    }

    #fill{
      width:0%;
      height:100%;
      background:#22c55e;
    }
  </style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="box">
    <h2>🐍 Loading Snake PRO...</h2>
    <div class="bar"><div id="fill"></div></div>
    <p id="percent">0%</p>
  </div>
</div>

<h2>🐍 Snake PRO (SLOW MODE)</h2>
<div class="score">Score: <span id="score">0</span></div>

<canvas id="game" width="300" height="300"></canvas>

<button onclick="restart()">Restart</button>

<div id="startScreen">
  <h2>Snake PRO</h2>
  <button onclick="start()">PLAY GAME</button>
</div>

<div id="gameOver">
  <h2>Game Over 💀</h2>
  <p>Score: <span id="final"></span></p>
  <button onclick="restart()">Play Again</button>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="setDir('up')">⬆️</button><br>
  <button onclick="setDir('left')">⬅️</button>
  <button onclick="setDir('down')">⬇️</button>
  <button onclick="setDir('right')">➡️</button>
</div>

<script>

/* LOADING 0-100 */
let load=0;
let loader=setInterval(()=>{
  load++;
  document.getElementById("fill").style.width=load+"%";
  document.getElementById("percent").innerText=load+"%";

  if(load>=100){
    clearInterval(loader);
    setTimeout(()=>{
      document.getElementById("loadingScreen").style.display="none";
    },300);
  }
},15);

/* GAME */
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let snake=[],food,d="RIGHT",score=0,game;
let box=15;

/* APPLE */
let apple=new Image();
apple.src="apple.png";

/* START */
function start(){
  document.getElementById("startScreen").style.display="none";
  init();
}

/* INIT */
function init(){
  clearInterval(game);

  snake=[{x:150,y:150}];
  d="RIGHT";
  score=0;
  food=random();

  document.getElementById("score").innerText=0;
  document.getElementById("gameOver").style.display="none";

  /* 🐌 SLOW SPEED FIX HERE */
  game=setInterval(loop,160);
}

function random(){
  return{
    x:Math.floor(Math.random()*20)*box,
    y:Math.floor(Math.random()*20)*box
  };
}

/* LOOP */
function loop(){

  ctx.clearRect(0,0,300,300);

  snake.forEach((s,i)=>{
    ctx.fillStyle=i?"#4ade80":"#22c55e";
    ctx.fillRect(s.x,s.y,box,box);
  });

  /* 🍎 GLOW APPLE */
  if(apple.complete){
    ctx.shadowColor="red";
    ctx.shadowBlur=12;
    ctx.drawImage(apple,food.x+2,food.y+2,box-4,box-4);
    ctx.shadowBlur=0;
  }

  let x=snake[0].x;
  let y=snake[0].y;

  if(d==="LEFT")x-=box;
  if(d==="RIGHT")x+=box;
  if(d==="UP")y-=box;
  if(d==="DOWN")y+=box;

  if(x<0||y<0||x>=300||y>=300||hit(x,y)){
    over();
    return;
  }

  if(x===food.x&&y===food.y){
    score++;
    document.getElementById("score").innerText=score;
    food=random();
  }else snake.pop();

  snake.unshift({x,y});
}

/* CONTROL */
function setDir(dir){
  if(dir==="left" && d!=="RIGHT") d="LEFT";
  if(dir==="right" && d!=="LEFT") d="RIGHT";
  if(dir==="up" && d!=="DOWN") d="UP";
  if(dir==="down" && d!=="UP") d="DOWN";
}

/* COLLISION */
function hit(x,y){
  return snake.some(s=>s.x===x&&s.y===y);
}

/* GAME OVER */
function over(){
  clearInterval(game);
  document.getElementById("final").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

/* RESTART */
function restart(){
  init();
}

</script>

</body>
</html>
