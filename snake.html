<!DOCTYPE html>
<html>
<head>
  <title>Snake Game PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    canvas {
      background:#020617;
      margin-top:20px;
      border-radius:10px;
    }

    .score {
      margin-top:10px;
    }

    button {
      margin-top:10px;
      padding:10px 20px;
      border:none;
      background:#22c55e;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    /* START SCREEN */
    #startScreen{
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.92);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .diff-btns button{
      margin:8px;
      width:120px;
    }

    .selected{
      background:#16a34a !important;
    }

    /* GAME OVER */
    #gameOver {
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.9);
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:1000;
    }

    /* CONTROLS */
    .controls button {
      width:60px;
      height:60px;
      margin:5px;
      font-size:20px;
      border-radius:10px;
      background:#1e293b;
      color:white;
    }

    .controls button:active {
      background:#22c55e;
    }
  </style>
</head>

<body>

<h1>🐍 Snake Game PRO</h1>
<div class="score">Score: <span id="score">0</span></div>

<canvas id="game" width="300" height="300"></canvas>

<br>
<button onclick="restart()">Restart</button>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>🐍 Snake Game</h1>
  <p>Select Difficulty</p>

  <div class="diff-btns">
    <button onclick="setDifficulty('easy',this)">Easy</button>
    <button onclick="setDifficulty('medium',this)">Medium</button>
    <button onclick="setDifficulty('hard',this)">Hard</button>
  </div>

  <button onclick="begin()" style="margin-top:20px;">PLAY GAME</button>
</div>

<!-- GAME OVER -->
<div id="gameOver">
  <h2>Game Over 💀</h2>
  <p>Your Score: <span id="finalScore"></span></p>
  <button onclick="restart()">Play Again</button>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="setDir('up')">⬆️</button><br>
  <button onclick="setDir('left')">⬅️</button>
  <button onclick="setDir('down')">⬇️</button>
  <button onclick="setDir('right')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 15;

let snake = [];
let food = {};
let direction = "RIGHT";
let score = 0;
let gameInterval = null;

let speed = 110;
let started = false;

/* DIFFICULTY */
function setDifficulty(level, btn){

  document.querySelectorAll(".diff-btns button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");

  if(level==="easy") speed = 150;
  if(level==="medium") speed = 110;
  if(level==="hard") speed = 70;
}

/* START GAME */
function begin(){
  document.getElementById("startScreen").style.display="none";
  startGame();
  started = true;
}

/* INIT */
function startGame(){

  clearInterval(gameInterval); // IMPORTANT FIX

  snake = [{x:150,y:150}];
  direction = "RIGHT";
  score = 0;

  food = randomFood();

  document.getElementById("score").innerText = score;
  document.getElementById("gameOver").style.display = "none";

  gameInterval = setInterval(draw, speed);
}

function randomFood(){
  return {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
  };
}

/* GAME LOOP */
function draw(){

  ctx.fillStyle="#020617";
  ctx.fillRect(0,0,300,300);

  for(let i=0;i<snake.length;i++){
    ctx.fillStyle = i===0 ? "#22c55e" : "#4ade80";
    ctx.fillRect(snake[i].x,snake[i].y,box,box);
  }

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if(direction==="LEFT") headX-=box;
  if(direction==="RIGHT") headX+=box;
  if(direction==="UP") headY-=box;
  if(direction==="DOWN") headY+=box;

  if(
    headX<0 || headY<0 ||
    headX>=300 || headY>=300 ||
    selfCollision(headX,headY)
  ){
    gameOver();
    return;
  }

  if(headX===food.x && headY===food.y){
    score++;
    document.getElementById("score").innerText = score;
    food = randomFood();
  } else {
    snake.pop();
  }

  snake.unshift({x:headX,y:headY});
}

/* COLLISION */
function selfCollision(x,y){
  return snake.some(s=>s.x===x && s.y===y);
}

/* CONTROLS */
function setDir(dir){
  if(dir==="left" && direction!=="RIGHT") direction="LEFT";
  if(dir==="up" && direction!=="DOWN") direction="UP";
  if(dir==="right" && direction!=="LEFT") direction="RIGHT";
  if(dir==="down" && direction!=="UP") direction="DOWN";
}

/* GAME OVER */
function gameOver(){
  clearInterval(gameInterval);

  document.getElementById("finalScore").innerText = score;
  document.getElementById("gameOver").style.display = "flex";
}

/* RESTART */
function restart(){
  startGame();
}
</script>

</body>
</html>
