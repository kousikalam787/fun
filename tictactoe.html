<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      background:url('bgl.jpg') center/cover no-repeat fixed;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    input,button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      justify-content:center;
      gap:10px;
      margin-top:20px;
      padding:15px;
      background:url('board.jpg') center/cover;
      border-radius:15px;
    }

    .cell{
      width:90px;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      border-radius:10px;
      background:rgba(0,0,0,0.4);
      cursor:pointer;
    }

    /* COUNTDOWN */
    #countPopup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      justify-content:center;
      align-items:center;
      z-index:999;
      font-size:60px;
      font-weight:bold;
      color:#22c55e;
    }

    /* RESULT POPUP */
    #popup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .box{
      width:280px;
      height:220px;
      border-radius:15px;
      background-size:cover;
      background-position:center;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      padding:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .box h2{
      margin-bottom:15px;
      background:rgba(0,0,0,0.5);
      padding:8px 15px;
      border-radius:8px;
    }

    .box button{
      margin-top:8px;
      width:120px;
    }
  </style>
</head>

<body>

<h2>❌⭕ Tic Tac Toe PRO</h2>

<input id="room" placeholder="Room Code"><br>
<button onclick="create()">Create</button>
<button onclick="join()">Join</button>

<p id="info"></p>
<p id="turn"></p>

<div class="board" id="board"></div>

<div id="countPopup"></div>

<!-- RESULT POPUP -->
<div id="popup">
  <div class="box" id="resultBox">
    <h2 id="msg"></h2>
    <button onclick="reset()">Rematch</button>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<!-- SOUND -->
<audio id="tapSound" src="tap.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="countSound" src="countdown.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  databaseURL:"https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem("user")||"Player";
let room=null;
let me=null;
let ended=false;
let gameStarted=false;

function play(id){
  let s=document.getElementById(id);
  if(s){
    s.currentTime=0;
    s.play().catch(()=>{});
  }
}

function create(){
  room=Math.random().toString(36).substr(2,5);
  me="X";

  db.ref("rooms/"+room).set({
    board:["","","","","","","","",""],
    turn:"X",
    players:{X:user,O:""},
    start:false
  });

  document.getElementById("info").innerText="Room: "+room;
  start();
}

function join(){
  room=document.getElementById("room").value.trim();
  if(!room) return;

  me="O";

  let ref=db.ref("rooms/"+room);

  ref.once("value").then(s=>{
    if(!s.exists()) return alert("Room not found");

    ref.update({
      "players/O": user,
      start:true
    });

    startCountdown();
  });

  document.getElementById("info").innerText="Joined Room";
  start();
}

function startCountdown(){
  let popup=document.getElementById("countPopup");
  popup.style.display="flex";

  let count=3;

  let interval=setInterval(()=>{
    popup.innerText=count;
    play("countSound");
    count--;

    if(count===-1){
      clearInterval(interval);
      popup.innerText="GO!";
      setTimeout(()=>{
        popup.style.display="none";
        gameStarted=true;
      },500);
    }
  },1000);
}

function start(){
  db.ref("rooms/"+room).on("value",snap=>{
    let d=snap.val();
    if(!d) return;

    draw(d.board);

    document.getElementById("turn").innerText="Turn: "+d.turn;

    if(me==="X" && d.start && !gameStarted){
      startCountdown();
    }

    if(check(d.board) && !ended){
      ended=true;
      play("winSound");

      let winner=d.turn==="X"?"O":"X";

      if(winner===me) show("👑 You Win!", "win.jpg");
      else show("🤡 You Lose!", "lose.jpg");
    }
  });
}

function draw(b){
  let div=document.getElementById("board");
  div.innerHTML="";

  b.forEach((v,i)=>{
    let c=document.createElement("div");
    c.className="cell";
    c.innerText=v;
    c.onclick=()=>move(i);
    div.appendChild(c);
  });
}

function move(i){
  if(!gameStarted || ended) return;

  play("tapSound");

  let ref=db.ref("rooms/"+room);

  ref.once("value").then(s=>{
    let d=s.val();

    if(d.board[i]!=="" || d.turn!==me) return;

    let b=[...d.board];
    b[i]=me;

    ref.update({
      board:b,
      turn:me==="X"?"O":"X"
    });
  });
}

function check(b){
  let p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return p.some(x=>x.every(i=>b[i]&&b[i]===b[x[0]]));
}

function show(text,bg){
  document.getElementById("msg").innerText=text;
  document.getElementById("resultBox").style.backgroundImage=`url('${bg}')`;
  document.getElementById("popup").style.display="flex";
}

function reset(){
  ended=false;
  gameStarted=false;

  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X",
    start:true
  });

  document.getElementById("popup").style.display="none";
  startCountdown();
}
</script>

</body>
</html>
