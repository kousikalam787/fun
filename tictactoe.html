<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      background:url('bgl.jpg') center/cover no-repeat fixed;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      justify-content:center;
      gap:10px;
      margin-top:20px;
      padding:15px;
      background:url('board.jpg') center/cover;
      border-radius:15px;
    }

    .cell{
      width:90px;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      background:rgba(0,0,0,0.4);
      border-radius:10px;
      cursor:pointer;
    }

    #countPopup{
      position:fixed;
      inset:0;
      display:none;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.85);
      font-size:70px;
      color:#22c55e;
      z-index:999;
    }

    #popup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      justify-content:center;
      align-items:center;
    }

    .box{
      width:280px;
      height:220px;
      background-size:cover;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      padding:20px;
      border-radius:15px;
    }

    /* CHAT */
    .chat-box{
      width:90%;
      max-width:360px;
      margin:20px auto;
      background:rgba(0,0,0,0.6);
      padding:10px;
      border-radius:12px;
    }

    #messages{
      height:180px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .bubble{
      max-width:70%;
      padding:8px;
      border-radius:10px;
    }

    .me{align-self:flex-end;background:#22c55e;color:black;}
    .other{align-self:flex-start;background:#eee;color:black;}

  </style>
</head>

<body>

<h2>❌⭕ Tic Tac Toe PRO</h2>

<input id="room" placeholder="Room Code">
<button onclick="create()">Create</button>
<button onclick="join()">Join</button>

<p id="info"></p>
<p id="turn"></p>

<div class="board" id="board"></div>
<div id="countPopup"></div>

<div id="popup">
  <div class="box" id="resultBox">
    <h2 id="msg"></h2>
    <button onclick="reset()">Rematch</button>
  </div>
</div>

<div class="chat-box">
  <div id="messages"></div>
  <input id="msgInput">
  <button onclick="sendMsg()">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIza...",
  databaseURL:"https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem("user")||"Player";
let room, me;

/* CREATE */
function create(){
  room=Math.random().toString(36).substr(2,5);
  me="X";

  db.ref("rooms/"+room).set({
    board:["","","","","","","","",""],
    turn:"X",
    players:{X:user,O:""},
    countdown:3,
    gameStarted:false
  });

  document.getElementById("info").innerText="Room: "+room;
  start();
  loadChat();
}

/* JOIN */
function join(){
  room=document.getElementById("room").value.trim();
  me="O";

  db.ref("rooms/"+room).update({
    "players/O":user
  });

  start();
  loadChat();
}

/* SYNC GAME */
function start(){
  db.ref("rooms/"+room).on("value",snap=>{
    let d=snap.val();
    if(!d) return;

    draw(d.board);
    document.getElementById("turn").innerText="Turn: "+d.turn;

    /* 🔥 SYNC COUNTDOWN */
    if(!d.gameStarted){
      showCountdown(d.countdown);

      if(me==="X"){
        setTimeout(()=>{
          db.ref("rooms/"+room).update({
            countdown:d.countdown-1
          });
        },1000);
      }

      if(d.countdown<=0){
        db.ref("rooms/"+room).update({gameStarted:true});
      }
    }else{
      document.getElementById("countPopup").style.display="none";
    }

    /* WIN */
    if(check(d.board)){
      let winner=d.turn==="X"?"O":"X";
      show(winner===me?"You Win":"You Lose");
    }

  });
}

/* COUNTDOWN UI */
function showCountdown(n){
  let p=document.getElementById("countPopup");
  p.style.display="flex";
  p.innerText=n>0?n:"GO";
}

/* MOVE */
function move(i){
  let ref=db.ref("rooms/"+room);

  ref.once("value").then(s=>{
    let d=s.val();

    if(!d.gameStarted) return;
    if(d.board[i]!=="" || d.turn!==me) return;

    let b=[...d.board];
    b[i]=me;

    ref.update({
      board:b,
      turn:me==="X"?"O":"X"
    });
  });
}

/* DRAW */
function draw(b){
  let div=document.getElementById("board");
  div.innerHTML="";
  b.forEach((v,i)=>{
    let c=document.createElement("div");
    c.className="cell";
    c.innerText=v;
    c.onclick=()=>move(i);
    div.appendChild(c);
  });
}

/* CHECK */
function check(b){
  let p=[[0,1,2],[3,4,5],[6,7,8],[0,4,8],[2,4,6]];
  return p.some(x=>x.every(i=>b[i]&&b[i]===b[x[0]]));
}

/* RESULT */
function show(t){
  document.getElementById("msg").innerText=t;
  document.getElementById("popup").style.display="flex";
}

/* RESET */
function reset(){
  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X",
    countdown:3,
    gameStarted:false
  });
  clearChat();
}

/* CHAT */
function sendMsg(){
  let i=document.getElementById("msgInput");
  db.ref("chats/"+room).push({user:user,msg:i.value});
  i.value="";
}

function loadChat(){
  db.ref("chats/"+room).on("child_added",snap=>{
    let d=snap.val();
    let div=document.createElement("div");
    div.className="bubble "+(d.user===user?"me":"other");
    div.innerText=d.msg;
    document.getElementById("messages").appendChild(div);
  });
}

function clearChat(){
  db.ref("chats/"+room).remove();
}
</script>

</body>
</html>
