<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe Online FIXED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    input,button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,90px);
      gap:10px;
      justify-content:center;
      margin-top:20px;
    }

    .cell{
      width:90px;
      height:90px;
      background:#1e293b;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      cursor:pointer;
      border-radius:10px;
    }

    .chat{
      margin-top:20px;
      max-width:300px;
      margin:auto;
      text-align:left;
    }

    .messages{
      height:150px;
      overflow:auto;
      background:#020617;
      padding:10px;
      border-radius:10px;
    }

    #popup{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    .popup-box{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      width:250px;
    }

    .leave-btn{
      background:red;
      color:white;
    }
  </style>
</head>

<body>

<h2>❌⭕ Tic Tac Toe FIXED</h2>

<input id="roomId" placeholder="Room Code">
<br>

<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>
<button class="leave-btn" onclick="leaveRoom()">Leave</button>

<p id="status">Not Connected</p>
<p id="turn"></p>

<div id="board" class="board"></div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages"></div>
  <input id="msg" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2 id="winText"></h2>
    <button onclick="rematch()">Rematch</button>
    <button onclick="restartGame()">Restart</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  databaseURL:"https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem("user")||"Guest";

let room=null;
let player=null;
let gameRef=null;
let chatRef=null;
let gameEnded=false;

/* ================= START SAFE ================= */
function startGame(){

  if(!room){
    console.log("No room");
    return;
  }

  if(gameRef) gameRef.off();
  if(chatRef) chatRef.off();

  gameRef=db.ref("rooms/"+room);
  chatRef=db.ref("rooms/"+room+"/chat");

  /* GAME LISTENER */
  gameRef.on("value",snap=>{

    let d=snap.val();

    if(!d || !d.board){
      document.getElementById("status").innerText="Room error";
      return;
    }

    draw(d.board);

    let pX=d.players?.X||"Waiting";
    let pO=d.players?.O||"Waiting";

    let turnName=d.players?.[d.turn]||"";

    document.getElementById("turn").innerText=
      "X:"+pX+" | O:"+pO+" | Turn:"+turnName;

    let win=checkWin(d.board);
    let draw=d.board.every(x=>x!=="");

    if((win||draw)&&!gameEnded){
      gameEnded=true;

      let winner=d.turn==="X"?"O":"X";
      let name=d.players[winner];

      showPopup(win ?
        (name===user?"🎉 You Win!":"😔 You Lost! Winner: "+name)
        :
        "🤝 Draw!");
    }
  });

  /* CHAT */
  chatRef.on("child_added",s=>{
    let d=s.val();
    let box=document.getElementById("messages");
    box.innerHTML+=`<p><b>${d.user}:</b> ${d.msg}</p>`;
    box.scrollTop=box.scrollHeight;
  });
}

/* ================= CREATE ================= */
function createRoom(){

  room=Math.random().toString(36).substr(2,5);
  player="X";
  gameEnded=false;

  let pass=prompt("Password:");

  db.ref("rooms/"+room).set({
    board:["","","","","","","","",""],
    turn:"X",
    password:pass,
    players:{
      X:user,
      O:""
    }
  });

  db.ref("rooms/"+room+"/players/X").onDisconnect().remove();

  document.getElementById("roomId").value=room;
  document.getElementById("status").innerText="Room Created";

  startGame();
}

/* ================= JOIN ================= */
function joinRoom(){

  room=document.getElementById("roomId").value.trim();
  if(!room) return;

  let pass=prompt("Password:");
  player="O";
  gameEnded=false;

  let ref=db.ref("rooms/"+room);

  ref.once("value").then(snap=>{

    if(!snap.exists()){
      alert("Room not found");
      return;
    }

    let d=snap.val();

    if(d.password!==pass){
      alert("Wrong password");
      return;
    }

    ref.child("players/O").set(user);
    ref.child("players/O").onDisconnect().remove();

    document.getElementById("status").innerText="Joined Room";

    startGame();
  });
}

/* ================= DRAW ================= */
function draw(b){
  let div=document.getElementById("board");
  div.innerHTML="";

  b.forEach((v,i)=>{
    let c=document.createElement("div");
    c.className="cell";
    c.innerText=v;
    c.onclick=()=>move(i);
    div.appendChild(c);
  });
}

/* ================= MOVE ================= */
function move(i){

  if(gameEnded) return;

  let ref=db.ref("rooms/"+room);

  ref.once("value").then(snap=>{

    let d=snap.val();
    if(!d) return;

    if(d.board[i]!==""||d.turn!==player) return;

    let b=[...d.board];
    b[i]=player;

    ref.update({
      board:b,
      turn:player==="X"?"O":"X"
    });
  });
}

/* ================= WIN ================= */
function checkWin(b){
  let p=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return p.some(x=>x.every(i=>b[i]&&b[i]===b[x[0]]));
}

/* ================= POPUP ================= */
function showPopup(t){
  document.getElementById("winText").innerText=t;
  document.getElementById("popup").style.display="flex";
}

/* ================= REMATCH ================= */
function rematch(){
  gameEnded=false;

  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X"
  });

  document.getElementById("popup").style.display="none";
}

/* ================= RESTART ================= */
function restartGame(){
  location.reload();
}

/* ================= LEAVE FIX ================= */
function leaveRoom(){

  if(room){
    db.ref("rooms/"+room+"/players/"+player).remove();
  }

  location.reload();
}

/* ================= CHAT ================= */
function sendMsg(){

  if(!room) return;

  let msg=document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+room+"/chat").push({
    user:user,
    msg:msg
  });

  document.getElementById("msg").value="";
}

</script>

</body>
</html>
