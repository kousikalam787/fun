<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      background:url('bgl.jpg') center/cover no-repeat fixed;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    input,button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      justify-content:center;
      gap:10px;
      margin-top:20px;
      padding:15px;
      background:url('board.jpg') center/cover;
      border-radius:15px;
    }

    .cell{
      width:90px;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      border-radius:10px;
      background:rgba(0,0,0,0.4);
      cursor:pointer;
    }

    /* COUNTDOWN */
    #countPopup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      justify-content:center;
      align-items:center;
      z-index:999;
      font-size:60px;
      color:#22c55e;
      font-weight:bold;
    }

    /* RESULT POPUP */
    #popup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      justify-content:center;
      align-items:center;
    }

    .box{
      width:280px;
      height:220px;
      border-radius:15px;
      background-size:cover;
      background-position:center;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      padding:20px;
    }

    .box h2{
      background:rgba(0,0,0,0.5);
      padding:8px 15px;
      border-radius:8px;
    }

    /* CHAT */
    .chat-box{
      width:90%;
      max-width:360px;
      margin:20px auto;
      background:rgba(0,0,0,0.6);
      padding:10px;
      border-radius:12px;
    }

    #messages{
      height:180px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .bubble{
      max-width:70%;
      padding:8px 12px;
      border-radius:12px;
      font-size:13px;
    }

    .me{
      align-self:flex-end;
      background:#22c55e;
      color:black;
    }

    .other{
      align-self:flex-start;
      background:#e5e7eb;
      color:black;
    }

    .chat-input{
      display:flex;
      gap:5px;
      margin-top:8px;
    }

    .chat-input input{
      flex:1;
      padding:8px;
    }

    .chat-input button{
      background:#22c55e;
      color:white;
    }

  </style>
</head>

<body>

<h2>❌⭕ Tic Tac Toe PRO</h2>

<input id="room" placeholder="Room Code"><br>
<button onclick="create()">Create</button>
<button onclick="join()">Join</button>

<p id="info"></p>
<p id="turn"></p>

<div class="board" id="board"></div>

<div id="countPopup"></div>

<div id="popup">
  <div class="box" id="resultBox">
    <h2 id="msg"></h2>
    <button onclick="reset()">Rematch</button>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-box">
  <div id="messages"></div>
  <div class="chat-input">
    <input id="msgInput" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- SOUND -->
<audio id="tapSound" src="tap.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="countSound" src="countdown.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  databaseURL:"https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem("user")||"Player";
let room=null, me=null, gameStarted=false, ended=false;

/* CREATE */
function create(){
  room=Math.random().toString(36).substr(2,5);
  me="X";

  db.ref("rooms/"+room).set({
    board:["","","","","","","","",""],
    turn:"X",
    players:{X:user,O:""},
    start:false
  });

  document.getElementById("info").innerText="Room: "+room;
  start();
  loadChat();
}

/* JOIN */
function join(){
  room=document.getElementById("room").value.trim();
  me="O";

  let ref=db.ref("rooms/"+room);

  ref.update({"players/O":user,start:true});

  startCountdown();
  start();
  loadChat();
}

/* COUNTDOWN */
function startCountdown(){
  let p=document.getElementById("countPopup");
  p.style.display="flex";

  let c=3;
  let i=setInterval(()=>{
    p.innerText=c;
    document.getElementById("countSound").play();
    c--;

    if(c==-1){
      clearInterval(i);
      p.innerText="GO!";
      setTimeout(()=>{
        p.style.display="none";
        gameStarted=true;
      },500);
    }
  },1000);
}

/* GAME */
function start(){
  db.ref("rooms/"+room).on("value",snap=>{
    let d=snap.val();
    if(!d) return;

    draw(d.board);
    document.getElementById("turn").innerText="Turn: "+d.turn;

    if(me==="X" && d.start && !gameStarted){
      startCountdown();
    }

    if(check(d.board) && !ended){
      ended=true;
      let winner=d.turn==="X"?"O":"X";

      if(winner===me) show("👑 You Win!","win.jpg");
      else show("🤡 You Lose!","lose.jpg");
    }
  });
}

function draw(b){
  let div=document.getElementById("board");
  div.innerHTML="";
  b.forEach((v,i)=>{
    let c=document.createElement("div");
    c.className="cell";
    c.innerText=v;
    c.onclick=()=>move(i);
    div.appendChild(c);
  });
}

function move(i){
  if(!gameStarted || ended) return;

  let ref=db.ref("rooms/"+room);
  ref.once("value").then(s=>{
    let d=s.val();
    if(d.board[i]!=="" || d.turn!==me) return;

    let b=[...d.board];
    b[i]=me;

    ref.update({board:b,turn:me==="X"?"O":"X"});
  });
}

/* CHECK */
function check(b){
  let p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return p.some(x=>x.every(i=>b[i]&&b[i]===b[x[0]]));
}

/* RESULT */
function show(t,bg){
  document.getElementById("msg").innerText=t;
  document.getElementById("resultBox").style.backgroundImage=`url('${bg}')`;
  document.getElementById("popup").style.display="flex";
}

/* RESET */
function reset(){
  ended=false;
  gameStarted=false;

  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X",
    start:true
  });

  clearChat();
  document.getElementById("popup").style.display="none";
  startCountdown();
}

/* CHAT */
function sendMsg(){
  let i=document.getElementById("msgInput");
  if(!i.value.trim()) return;

  db.ref("chats/"+room).push({
    user:user,
    msg:i.value
  });

  i.value="";
}

function loadChat(){
  let box=document.getElementById("messages");
  box.innerHTML="";

  db.ref("chats/"+room).off();

  db.ref("chats/"+room).on("child_added",snap=>{
    let d=snap.val();

    let div=document.createElement("div");
    div.className="bubble "+(d.user===user?"me":"other");
    div.innerText=d.msg;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
}

function clearChat(){
  db.ref("chats/"+room).remove();
}
</script>

</body>
</html>
