<!DOCTYPE html>
<html>
<head>
  <title>Multiplayer Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    input, button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    .board {
      display:grid;
      grid-template-columns:repeat(3,90px);
      gap:10px;
      justify-content:center;
      margin-top:20px;
    }

    .cell {
      width:90px;
      height:90px;
      background:#1e293b;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      cursor:pointer;
      border-radius:10px;
    }

    .chat {
      margin-top:20px;
      max-width:300px;
      margin:auto;
      text-align:left;
    }

    .messages {
      height:150px;
      overflow:auto;
      background:#020617;
      padding:10px;
      border-radius:10px;
    }

    #popup {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    .popup-box {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      width:250px;
    }
  </style>
</head>

<body>

<h2>❌⭕ Tic Tac Toe Online</h2>

<input id="roomId" placeholder="Room Code">
<br>

<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<p id="status"></p>
<p id="turn"></p>

<div class="board" id="board"></div>

<div class="chat">
  <div class="messages" id="messages"></div>
  <input id="msg" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
</div>

<div id="popup">
  <div class="popup-box">
    <h2 id="winText"></h2>
    <button onclick="rematch()">🔁 Rematch</button>
    <button onclick="restartGame()">🔄 Restart</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  databaseURL: "https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem("user") || "Guest";
let room = null;
let player = null;

let gameRef = null;
let chatRef = null;
let gameEnded = false;

/* ================= CREATE ROOM ================= */
function createRoom(){
  room = Math.random().toString(36).substr(2,5);
  player = "X";

  let password = prompt("Set Room Password:");

  let ref = db.ref("rooms/"+room);

  ref.set({
    board:["","","","","","","","",""],
    turn:"X",
    password: password,
    players:{
      X: username,
      O: null
    }
  });

  // 🔥 AUTO REMOVE ON DISCONNECT (IMPORTANT FIX)
  ref.child("players/X").onDisconnect().remove();

  document.getElementById("roomId").value = room;
  document.getElementById("status").innerText = "Room Created (X)";

  startListeners();
}

/* ================= JOIN ROOM ================= */
function joinRoom(){
  room = document.getElementById("roomId").value.trim();
  if(!room) return alert("Enter room code");

  let pass = prompt("Enter Password:");
  player = "O";

  let ref = db.ref("rooms/"+room);

  ref.once("value").then(snap=>{
    if(!snap.exists()){
      alert("Room not found ❌");
      return;
    }

    let data = snap.val();

    if(data.password !== pass){
      alert("Wrong password ❌");
      return;
    }

    ref.child("players/O").set(username);

    // 🔥 AUTO REMOVE ON DISCONNECT (IMPORTANT FIX)
    ref.child("players/O").onDisconnect().remove();

    document.getElementById("status").innerText = "Joined Room (O)";

    startListeners();
  });
}

/* ================= LISTENERS ================= */
function startListeners(){

  if(gameRef) gameRef.off();
  if(chatRef) chatRef.off();

  gameRef = db.ref("rooms/"+room);
  chatRef = db.ref("rooms/"+room+"/chat");

  gameRef.on("value", snap=>{
    let data = snap.val();
    if(!data) return;

    drawBoard(data.board);

    // 🔥 LIVE PLAYER FIX (auto update UI)
    let pX = data.players?.X || "Empty";
    let pO = data.players?.O || "Empty";

    document.getElementById("turn").innerText =
      `X: ${pX} | O: ${pO} | Turn: ${data.turn}`;

    if(checkWin(data.board) && !gameEnded){
      gameEnded = true;

      let winner = data.players[data.turn === "X" ? "O" : "X"];

      showPopup("🏆 Winner: " + winner);
    }

    if(data.board.every(x => x !== "") && !gameEnded){
      gameEnded = true;
      showPopup("🤝 Game Draw!");
    }
  });

  chatRef.on("child_added", snap=>{
    let d = snap.val();
    let div = document.getElementById("messages");

    div.innerHTML += `<p><b>${d.user}:</b> ${d.msg}</p>`;
    div.scrollTop = div.scrollHeight;
  });
}

/* ================= BOARD ================= */
function drawBoard(board){
  let div = document.getElementById("board");
  div.innerHTML="";

  board.forEach((val,i)=>{
    let cell=document.createElement("div");
    cell.classList.add("cell");
    cell.innerText=val;
    cell.onclick=()=>move(i);
    div.appendChild(cell);
  });
}

/* ================= MOVE ================= */
function move(i){
  if(gameEnded) return;

  let ref = db.ref("rooms/"+room);

  ref.once("value").then(snap=>{
    let data = snap.val();
    if(!data) return;

    if(data.board[i]!=="" || data.turn!==player) return;

    data.board[i] = player;
    data.turn = player==="X" ? "O" : "X";

    ref.update({
      board: data.board,
      turn: data.turn
    });
  });
}

/* ================= WIN ================= */
function checkWin(b=[]){
  let p = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return p.some(x=>x.every(i=>b[i] && b[i]===b[x[0]]));
}

/* ================= POPUP ================= */
function showPopup(text){
  document.getElementById("winText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

/* ================= REMATCH ================= */
function rematch(){
  gameEnded = false;

  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X"
  });

  document.getElementById("popup").style.display="none";
}

/* ================= RESTART ================= */
function restartGame(){
  location.reload();
}

/* ================= CHAT ================= */
function sendMsg(){
  if(!room) return;

  let text = document.getElementById("msg").value;
  if(!text) return;

  db.ref("rooms/"+room+"/chat").push({
    user: username,
    msg: text
  });

  document.getElementById("msg").value="";
}
</script>

</body>
</html>
