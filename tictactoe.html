<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    input,button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,90px);
      justify-content:center;
      gap:10px;
      margin-top:20px;
    }

    .cell{
      width:90px;
      height:90px;
      background:#1e293b;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      border-radius:10px;
      cursor:pointer;
    }

    #countdown{
      font-size:22px;
      color:#22c55e;
      margin-top:10px;
    }

    #popup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      justify-content:center;
      align-items:center;
    }

    .box{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      width:250px;
    }
  </style>
</head>

<body>

<h2>❌⭕ Tic Tac Toe PRO</h2>

<input id="room" placeholder="Room Code"><br>
<button onclick="create()">Create</button>
<button onclick="join()">Join</button>

<p id="info"></p>
<p id="turn"></p>
<p id="countdown"></p>

<div class="board" id="board"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <h2 id="msg"></h2>
    <button onclick="reset()">Rematch</button>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<!-- SOUND -->
<audio id="tapSound" src="tap.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="countSound" src="countdown.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  databaseURL:"https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem("user")||"Player";
let room=null;
let me=null;
let ended=false;

let gameStarted=false;
let lastCount=null;

/* SOUND */
function play(id){
  let s=document.getElementById(id);
  if(s){
    s.currentTime=0;
    s.play().catch(()=>{});
  }
}

/* CREATE */
function create(){
  room=Math.random().toString(36).substr(2,5);
  me="X";
  ended=false;

  db.ref("rooms/"+room).set({
    board:["","","","","","","","",""],
    turn:"X",
    players:{X:user,O:""},
    startTime:null
  });

  document.getElementById("info").innerText=
    "Room: "+room+" | You: X ("+user+")";

  start();
}

/* JOIN */
function join(){
  room=document.getElementById("room").value.trim();
  if(!room) return;

  me="O";
  ended=false;

  db.ref("rooms/"+room+"/players/O").set(user);

  /* ⏳ start timer trigger */
  db.ref("rooms/"+room+"/startTime").set(Date.now());

  document.getElementById("info").innerText=
    "Joined Room | You: O ("+user+")";

  start();
}

/* START */
function start(){

  db.ref("rooms/"+room).on("value",snap=>{

    let d=snap.val();
    if(!d || !d.board) return;

    draw(d.board);

    let pX=d.players?.X||"Waiting";
    let pO=d.players?.O||"Waiting";

    document.getElementById("turn").innerText=
      `X: ${pX} | O: ${pO} | Turn: ${d.turn}`;

    /* ⏳ COUNTDOWN */
    if(d.startTime){

      let now=Date.now();
      let diff=Math.floor((now-d.startTime)/1000);
      let remaining=3-diff;

      if(remaining>0){
        document.getElementById("countdown").innerText=
          "Starting in "+remaining+"...";

        if(lastCount!==remaining){
          play("countSound");
          lastCount=remaining;
        }

        gameStarted=false;
        return;
      }else{
        document.getElementById("countdown").innerText="GO!";
        gameStarted=true;
      }

    }else{
      document.getElementById("countdown").innerText=
        "Waiting for player...";
      gameStarted=false;
      return;
    }

    /* WIN */
    if(check(d.board) && !ended){
      ended=true;
      play("winSound");

      let winner=d.turn==="X"?"O":"X";
      let name=d.players[winner];

      if(name===user) show("👑 You Win!");
      else show("🤡 You Lose!");
    }

    if(d.board.every(x=>x!=="") && !ended){
      ended=true;
      show("🤝 Draw!");
    }
  });
}

/* DRAW */
function draw(b){
  let div=document.getElementById("board");
  div.innerHTML="";

  b.forEach((v,i)=>{
    let c=document.createElement("div");
    c.className="cell";
    c.innerText=v;
    c.onclick=()=>move(i);
    div.appendChild(c);
  });
}

/* MOVE */
function move(i){

  if(!gameStarted) return;
  if(ended) return;

  play("tapSound");

  let ref=db.ref("rooms/"+room);

  ref.once("value").then(s=>{
    let d=s.val();
    if(!d) return;

    if(d.board[i]!=="" || d.turn!==me) return;

    let b=[...d.board];
    b[i]=me;

    ref.update({
      board:b,
      turn:me==="X"?"O":"X"
    });
  });
}

/* CHECK */
function check(b){
  let p=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return p.some(x=>x.every(i=>b[i]&&b[i]===b[x[0]]));
}

/* POPUP */
function show(t){
  document.getElementById("msg").innerText=t;
  document.getElementById("popup").style.display="flex";
}

/* RESET */
function reset(){
  ended=false;
  gameStarted=false;
  lastCount=null;

  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X",
    startTime:Date.now()
  });

  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
