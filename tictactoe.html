<!DOCTYPE html>
<html>
<head>
  <title>TTT CLEAN ONLINE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    input,button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,90px);
      justify-content:center;
      gap:10px;
      margin-top:20px;
    }

    .cell{
      width:90px;
      height:90px;
      background:#1e293b;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      border-radius:10px;
      cursor:pointer;
    }

    #popup{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,.8);
      justify-content:center;
      align-items:center;
    }

    .box{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      width:250px;
    }
  </style>
</head>

<body>

<h2>❌⭕ CLEAN TTT ONLINE</h2>

<input id="room" placeholder="Room Code">
<br>
<button onclick="create()">Create</button>
<button onclick="join()">Join</button>

<p id="info"></p>
<p id="turn"></p>

<div class="board" id="board"></div>

<div id="popup">
  <div class="box">
    <h2 id="msg"></h2>
    <button onclick="reset()">Rematch</button>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDTK0-Q2ev1MWrouI0j9HohKmg-O6g9HWs",
  databaseURL:"https://kousik-game-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=localStorage.getItem("user")||"P1";
let room=null;
let me=null;
let ended=false;

/* CREATE */
function create(){
  room=Math.random().toString(36).substr(2,5);
  me="X";
  ended=false;

  db.ref("rooms/"+room).set({
    board:["","","","","","","","",""],
    turn:"X",
    players:{X:user,O:""}
  });

  db.ref("rooms/"+room+"/players/X").onDisconnect().remove();

  document.getElementById("info").innerText="Room: "+room;

  start();
}

/* JOIN */
function join(){
  room=document.getElementById("room").value.trim();
  if(!room) return;

  me="O";
  ended=false;

  db.ref("rooms/"+room+"/players/O").set(user);
  db.ref("rooms/"+room+"/players/O").onDisconnect().remove();

  document.getElementById("info").innerText="Joined: "+room;

  start();
}

/* START GAME */
function start(){

  let ref=db.ref("rooms/"+room);

  ref.on("value",snap=>{

    let d=snap.val();
    if(!d || !d.board) return;

    draw(d.board);

    document.getElementById("turn").innerText=
      `Turn: ${d.turn}`;

    if(check(d.board) && !ended){
      ended=true;

      let winner=d.turn==="X"?"O":"X";
      let name=d.players[winner];

      show(name===user?"You Win 🎉":"You Lose 😔");
    }

    if(d.board.every(x=>x!=="") && !ended){
      ended=true;
      show("Draw 🤝");
    }
  });
}

/* DRAW */
function draw(b){
  let d=document.getElementById("board");
  d.innerHTML="";
  b.forEach((v,i)=>{
    let c=document.createElement("div");
    c.className="cell";
    c.innerText=v;
    c.onclick=()=>move(i);
    d.appendChild(c);
  });
}

/* MOVE */
function move(i){
  if(ended) return;

  let ref=db.ref("rooms/"+room);

  ref.once("value").then(s=>{

    let d=s.val();
    if(!d) return;

    if(d.board[i]!=="" || d.turn!==me) return;

    let b=[...d.board];
    b[i]=me;

    ref.update({
      board:b,
      turn:me==="X"?"O":"X"
    });
  });
}

/* WIN */
function check(b){
  let p=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return p.some(x=>x.every(i=>b[i]&&b[i]===b[x[0]]));
}

/* POPUP */
function show(t){
  document.getElementById("msg").innerText=t;
  document.getElementById("popup").style.display="flex";
}

/* RESET */
function reset(){
  ended=false;

  db.ref("rooms/"+room).update({
    board:["","","","","","","","",""],
    turn:"X"
  });

  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
